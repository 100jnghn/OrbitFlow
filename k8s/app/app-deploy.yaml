apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbitflow
  labels:
    app: orbitflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orbitflow
  template:
    metadata:
      labels:
        app: orbitflow
    spec:
      containers:
        - name: orbitflow
          image: ${ECR_REPO_URI}:${IMAGE_TAG}
          imagePullPolicy: Always

          ports:
            - containerPort: 8090

          # ===============================
          # 🔑 환경 변수 (Secret 기반)
          # ===============================
          envFrom:
            - secretRef:
                name: orbitflow-secret

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: RENDER_BASE_URL
              value: "http://spring-boot-service"

            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY

            - name: AWS_REGION
              value: eu-west-3

            # ===============================
            # 🧠 JVM Heap 설정 (🔥 PDF OOM 해결 핵심)
            # ===============================
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx768m"

          # ===============================
          # 🚀 Startup Probe
          # ===============================
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3

          # ===============================
          # ❤️ Readiness Probe
          # ===============================
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          # ===============================
          # 💀 Liveness Probe
          # ===============================
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          # ===============================
          # ⚙️ Resource (🔥 메모리 상향)
          # ===============================
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
  labels:
    app: orbitflow
spec:
  selector:
    app: orbitflow
  ports:
    - name: http
      port: 80
      targetPort: 8090
      protocol: TCP
  type: ClusterIP
