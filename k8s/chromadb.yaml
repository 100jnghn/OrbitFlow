apiVersion: v1
kind: Service
metadata:
  name: chromadb
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.4.21
          ports:
            - containerPort: 8000
          env:
            - name: CHROMA_PERSIST_DIRECTORY
              value: /chroma/data
          command: [ "uvicorn" ]                 # 🔥 핵심
          args:
            - "chromadb.app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/data
      volumes:
        - name: chroma-data
          emptyDir: { }
