apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbitflow
  labels:
    app: orbitflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orbitflow
  template:
    metadata:
      labels:
        app: orbitflow
    spec:
      containers:
        - name: orbitflow
          image: ${ECR_REPO_URI}:${IMAGE_TAG}
          imagePullPolicy: Always

          ports:
            - containerPort: 8090

          # 🔑 모든 민감 정보는 Secret에서 주입
          envFrom:
            - secretRef:
                name: orbitflow-secret

          # 🔧 환경별/런타임 설정
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: PUBLIC_BASE_URL
              value: "${PUBLIC_BASE_URL}"

            - name: RENDER_BASE_URL
              value: "http://spring-boot-service"

          # ❤️ Health Check (ALB + K8s 공용)
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 40
            periodSeconds: 20

          # ⚙️ 리소스 제한 (HPA 대비)
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
  labels:
    app: orbitflow
spec:
  selector:
    app: orbitflow
  ports:
    - port: 80
      targetPort: 8090
      protocol: TCP
  type: ClusterIP
