apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orbitflow
  namespace: default
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: orbitflow
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
