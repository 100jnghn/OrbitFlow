version: '3.9'

services:
  chromadb:
    # 'latest' 대신 0.5.20 버전을 명시하여 v1 API 호환성을 유지합니다.
    image: chromadb/chroma:0.5.20
    container_name: orbitflow-chromadb
    ports:
      - "8000:8000"
    environment:
      # --- 인덱싱 및 검색 최적화 (HNSW) ---
      # 각 노드의 최대 연결 수 (기본값 16, 정확도를 위해 32로 상향)
      - CHROMA_HNSW_M=32
      # 인덱스 생성 시 탐색 범위 (높을수록 품질 향상)
      - CHROMA_HNSW_EF_CONSTRUCTION=200
      # 검색 시 탐색 범위
      - CHROMA_HNSW_EF_SEARCH=100

      # --- 서버 설정 ---
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE # 텔레메트리 비활성화 (보안 및 성능)

    # 데이터 보존을 위한 볼륨 설정
    volumes:
      - ./chroma_data:/chroma/chroma

    # 리소스 제한 (사내 매뉴얼 데이터 양에 따라 조절)
    deploy:
      resources:
        limits:
          cpus: '2.0'      # 벡터 연산을 위해 2코어 이상 할당 권장
          memory: 4G       # 인덱스가 메모리에 올라와야 검색이 빠름
        reservations:
          memory: 2G

    restart: always

# 볼륨 정의
volumes:
  chroma_data:
    driver: local