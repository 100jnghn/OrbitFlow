spring:
  datasource:
    url: jdbc:mysql://prod-db:3306/orbitflow
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none       # 운영에서는 절대 자동 변경 X
    show-sql: false

  thymeleaf:
    cache: true

server:
  port: 8080

logging:
  level:
    root: info

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
