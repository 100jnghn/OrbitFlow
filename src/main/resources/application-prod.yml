# ===============================
# 🌐 App 기본 정보
# ===============================
app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8090}
  render-base-url: ${RENDER_BASE_URL:http://spring-boot-service}

  # ===============================
  # 🗄️ RDS (MySQL)
  # ===============================
  datasource:
    url: jdbc:mysql://sample-rds.cdtoh9nnhedm.eu-west-3.rds.amazonaws.com:3306/orbitflow?serverTimezone=UTC&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===============================
  # 🧠 JPA
  # ===============================
  jpa:
    hibernate:
      ddl-auto: none              # 🔥 운영에서는 절대 update X
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # ===============================
  # 🚀 Redis (Spring Boot 3.x)
  # ===============================
  data:
    redis:
      host: redis                 # ✅ Kubernetes Service 이름
      port: 6379
      timeout: 5s

  # ===============================
  # 📧 Mail (운영에서도 그대로 사용 가능)
  # ===============================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ===============================
  # 📎 Multipart
  # ===============================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # ===============================
  # 🧾 Thymeleaf
  # ===============================
  thymeleaf:
    cache: true

# ===============================
# 🌐 Server
# ===============================
server:
  port: 8090                     # 컨테이너 포트 (Service가 80 → 8090)

# ===============================
# 📜 Logging
# ===============================
logging:
  level:
    root: info

# ===============================
# 🔐 JWT
# ===============================
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

# ===============================
# 🔗 외부 비즈니스 API
# ===============================
external:
  business:
    api-key: ${BSN_KEY}
    url: https://api.odcloud.kr/api/nts-businessman/v1/status

business:
  validation:
    strict: false                # 시연/운영 선택

# ===============================
# 🔥 ChromaDB (Vector DB)
# ===============================
chroma:
  host: chromadb                 # ✅ Kubernetes Service 이름
  port: 8000
  scheme: http

# ===============================
# 🤖 OpenAI / LangChain
# ===============================
openai:
  model: gpt-4o-mini
  api-key: ${OPENAI_API_KEY}
  api-url:
    completion: https://api.openai.com/v1/chat/completions

langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o-mini

# ===============================
# ☁️ AWS / S3
# ===============================
cloud:
  aws:
    region: ${AWS_REGION}
    s3:
      bucket: ${BUCKET}

# ===============================
# 📅 공휴일 API
# ===============================
holiday:
  api:
    url: http://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo
    api-key: ${HOLIDAY_API_KEY}

# ===============================
# 🔔 Notification / Batch
# ===============================
notification:
  expire-days: 50
  cleanup-cron: "0 0 2 * * *"

# ===============================
# ❤️ Actuator / Health (ALB용)
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    redis:
      enabled: true
