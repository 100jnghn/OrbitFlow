spring:
  datasource:
    url: jdbc:mysql://localhost:3306/orbitflow
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: optional:file:.env[.properties]

  jpa:
    hibernate:
      ddl-auto: update     # 개발 중엔 update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}
