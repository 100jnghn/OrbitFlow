app:
  base-url: http://localhost:8090

spring:
  redis:
    data:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

  datasource:
    url: jdbc:mysql://localhost:3306/orbitflow
    username: scott
    password: tiger
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jpa:
    hibernate:
      ddl-auto: update     # 개발 중엔 update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

external:
  business:
    api-key: ${BSN_KEY}
    url: https://api.odcloud.kr/api/nts-businessman/v1/status

business:
  validation:
    strict: false   # 시연용 (true = 운영)

openai:
  model: gpt-4o-mini
  api-key: ${OPENAI_API_KEY}
  api-url:
    completion: https://api.openai.com/v1/chat/completions

langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o-mini

file:
  upload-dir:

cloud:
  aws:
    region: ${REGION}
    s3:
      bucket: ${BUCKET}
holiday:
  api:
    url: https://api.example.com/holidays?year={year}&serviceKey={apiKey}
    api-key: YOUR_API_KEY
