<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/board/user-board-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-user.css}">
        <link rel="stylesheet" th:href="@{/css/user-sidebar/user-sidebar.css}">
        <link rel="stylesheet" th:href="@{/css/board/board.css}">
    </th:block>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/board/board-write.js}"></script>
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="board-container">
        <!-- 게시판 제목 -->
        <div class="board-header">
            <h1 id="boardCategoryName">게시판</h1>
        </div>

        <!-- 글쓰기 폼 -->
        <form id="boardWriteForm" class="board-write-form">
            <input type="hidden" id="categoryId" th:value="${categoryId}">
            <input type="hidden" id="boardId" th:value="${boardId}">

            <!-- 제목 입력 -->
            <div class="form-group">
                <label for="boardTitleInput" class="form-label">제목</label>
                <input type="text" id="boardTitleInput" class="form-input" placeholder="제목을 입력해주세요" required maxlength="100" oninput="updateTitleCharCount()">
                <div id="titleCharCount" class="char-count" style="display: none;"></div>
                <div id="boardTitleError" class="error-message" style="display: none;"></div>
            </div>

            <!-- 파일 업로드 -->
            <div class="form-group">
                <label class="form-label">파일 업로드</label>
                <div class="file-upload-section">
                    <button type="button" class="btn-file-upload" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-camera"></i> 파일 업로드
                    </button>
                    <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(event)">
                    <div id="fileList" class="file-list"></div>
                </div>
            </div>

            <!-- 내용 입력 -->
            <div class="form-group">
                <label for="boardContent" class="form-label">내용</label>
                <textarea id="boardContent" class="form-textarea" placeholder="내용을 입력해주세요" required maxlength="10000" oninput="updateContentCharCount()"></textarea>
                <div id="contentCharCount" class="char-count" style="display: none;"></div>
                <div id="boardContentError" class="error-message" style="display: none;"></div>
            </div>

            <!-- 버튼 -->
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="cancelWrite()">취소</button>
                <button type="submit" class="btn-submit" id="submitBtn">등록</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
