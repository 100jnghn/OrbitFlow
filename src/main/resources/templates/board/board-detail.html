<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/board-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-user.css}">
        <link rel="stylesheet" th:href="@{/css/board.css}">
    </th:block>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/board-detail.js}"></script>
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="board-container">
        <!-- 게시글 상세 헤더 -->
        <div class="board-detail-header">
            <button type="button" class="btn-back" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> 목록
            </button>
        </div>

        <!-- 게시글 상세 내용 -->
        <div class="board-detail-content" id="boardDetailContent">
            <div class="loading-message">게시글을 불러오는 중...</div>
        </div>
    </div>
</div>

</body>
</html>
