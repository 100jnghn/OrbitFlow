<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout-admin :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/admin-sidebar :: menu},
          ~{::pageCss},
          ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>챗봇 매뉴얼 관리</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
        <link rel="stylesheet" th:href="@{/css/admin-chatbot/chatbot-manual.css}">
    </th:block>
</head>

<body>

    <div th:fragment="content">
        <div class="board-admin-container">
            <div class="board-header">
                <h1>챗봇 매뉴얼 문서 관리</h1>
                <p class="page-description">RAG 기반 답변 생성을 위한 카테고리 매뉴얼을 등록합니다.</p>
            </div>

            <section class="rule-section">
                <div class="section-header">
                    <h2>1. 매뉴얼 카테고리 관리</h2>
                    <button type="button" id="addCategoryBtn" class="btn-add-category">
                        <i class="fas fa-plus"></i> 카테고리 추가
                    </button>
                </div>
                <div class="category-buttons" id="categoryButtons">
                    <!-- 동적으로 카테고리 버튼이 생성됩니다 -->
                </div>
            </section>

            <section class="rule-section">
                <h2>2. 매뉴얼 파일 첨부 (.txt, .pdf, .doc)</h2>
                <div class="file-upload-area" id="fileUploadArea">
                    <div class="upload-content">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <p>파일을 드래그하여 여기에 놓거나, 클릭하여 파일을 선택하세요.</p>
                        <p class="upload-hint">최대 10MB (TXT, PDF, DOC)</p>
                    </div>
                    <input type="file" id="fileInput"
                        accept=".txt,.pdf,.doc,application/pdf,text/plain,application/msword" style="display: none;">
                </div>
                <div class="upload-actions">
                    <button type="button" id="uploadBtn" class="btn-primary">업로드</button>
                </div>
            </section>

            <section class="rule-section">
                <h2 id="manualListTitle">3. 등록된 매뉴얼 목록 (카테고리: <span id="selectedCategoryName">선택 중...</span>)</h2>
                <div class="table-container">
                    <table class="exception-table">
                        <thead>
                            <tr>
                                <th>파일명</th>
                                <th>등록일</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="manualListBody">
                            <tr>
                                <td colspan="3" style="text-align: center; padding: 20px;">등록된 매뉴얼이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <!-- 카테고리 추가/수정 모달 -->
        <div id="categoryModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">카테고리 추가</h3>
                    <button type="button" class="modal-close" onclick="closeCategoryModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm">
                        <div class="form-group">
                            <label for="categoryName">카테고리 이름 <span class="required">*</span></label>
                            <input type="text" id="categoryName" name="categoryName" class="form-input"
                                placeholder="카테고리 이름을 입력하세요" maxlength="50" required>
                        </div>
                        <div class="form-group">
                            <label for="categoryDescription">설명</label>
                            <textarea id="categoryDescription" name="description" class="form-textarea"
                                placeholder="카테고리 설명을 입력하세요 (선택사항)" maxlength="255" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="categorySortOrder">정렬 순서</label>
                            <input type="number" id="categorySortOrder" name="sortOrder" class="form-input"
                                placeholder="숫자가 작을수록 먼저 표시됩니다" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeCategoryModal()">취소</button>
                    <button type="button" id="saveCategoryBtn" class="btn-primary" onclick="saveCategory()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-chatbot/chatbot-manual.js}"></script>
    </th:block>

</body>

</html>
