<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss}
      )}">
<head>
    <meta charset="UTF-8">
    <title>결재 관리</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
        <style>
            .approval-list-container {
                background: #fff;
                border-radius: 8px;
                padding: 24px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            }

            .page-header {
                margin-bottom: 24px;
            }

            .page-header h1 {
                font-size: 24px;
                font-weight: 600;
                color: #1e3a5f;
                margin-bottom: 8px;
            }

            .page-description {
                color: #666;
                font-size: 14px;
            }

            .filter-section {
                display: flex;
                gap: 12px;
                margin-bottom: 24px;
                align-items: center;
            }

            .filter-section select,
            .filter-section input {
                padding: 8px 12px;
                border: 1px solid #ddd;
                border-radius: 4px;
                font-size: 14px;
            }

            .filter-section select {
                min-width: 120px;
            }

            .filter-section input {
                flex: 1;
                max-width: 300px;
            }

            .filter-section button {
                padding: 8px 16px;
                background: #5687ef;
                color: #fff;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
            }

            .filter-section button:hover {
                background: #386adc;
            }

            .approval-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 16px;
            }

            .approval-table th {
                background: #f5f7fa;
                padding: 12px;
                text-align: left;
                font-weight: 600;
                color: #333;
                border-bottom: 2px solid #e5e7eb;
            }

            .approval-table td {
                padding: 12px;
                border-bottom: 1px solid #e5e7eb;
            }

            .approval-table tr:hover {
                background: #f9fafb;
            }

            .status-badge {
                display: inline-block;
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: 500;
            }

            .status-draft { background: #e5e7eb; color: #374151; }
            .status-submitted { background: #dbeafe; color: #1e40af; }
            .status-in-progress { background: #fef3c7; color: #92400e; }
            .status-approved { background: #d1fae5; color: #065f46; }
            .status-rejected { background: #fee2e2; color: #991b1b; }

            .empty-state {
                text-align: center;
                padding: 60px 20px;
                color: #9ca3af;
            }

            .empty-state i {
                font-size: 48px;
                margin-bottom: 16px;
                color: #d1d5db;
            }
        </style>
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="approval-list-container">
        <div class="page-header">
            <h1>결재 관리</h1>
            <p class="page-description">결재 문서를 조회하고 관리할 수 있습니다.</p>
        </div>

        <div class="filter-section">
            <select id="statusFilter">
                <option value="">전체 상태</option>
                <option value="DRAFT">초안</option>
                <option value="SUBMITTED">제출됨</option>
                <option value="IN_PROGRESS">진행중</option>
                <option value="APPROVED">승인됨</option>
                <option value="REJECTED">반려됨</option>
            </select>
            <input type="text" id="keywordInput" placeholder="제목 또는 작성자로 검색">
            <button id="searchBtn">검색</button>
        </div>

        <table class="approval-table">
            <thead>
                <tr>
                    <th style="width: 60px;">번호</th>
                    <th style="width: 200px;">양식명</th>
                    <th>제목</th>
                    <th style="width: 120px;">작성자</th>
                    <th style="width: 100px;">상태</th>
                    <th style="width: 150px;">작성일</th>
                </tr>
            </thead>
            <tbody id="approvalTableBody">
                <tr>
                    <td colspan="6" class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>결재 문서가 없습니다.</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 세션 만료 모달 -->
    <div id="sessionModal"
         style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:10000;">
        <div style="background:#fff; padding:20px; margin:200px auto; width:300px;">
            <p>세션이 만료되었습니다. 다시 로그인해주세요.</p>
            <button onclick="confirmSessionExpired()">확인</button>
        </div>
    </div>
</div>

<script>
    // 결재 문서 목록 로드 (추후 API 연동)
    document.addEventListener('DOMContentLoaded', function() {
        // TODO: API 연동하여 결재 문서 목록 로드
        console.log('결재 관리 페이지 로드됨');
    });
</script>

</body>
</html>
