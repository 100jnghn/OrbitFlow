<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">


<head>
    <meta charset="UTF-8">
    <title>비품 정보</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-item/admin-item.css}">
        <link rel="stylesheet" th:href="@{/css/ui/fullscreenSpinner.css}">
    </th:block>

    <!-- ✅ 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-item/admin-item.js}" type="module"></script>
    </th:block>
</head>

<body>

    <!-- Main Content -->
    <div th:fragment="content">

        <!-- Page Header -->
        <div class="detail-header">
            <div class="header-left">
                <button type="button" class="btn-back" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i>
                    뒤로가기
                </button>
                <h1 class="page-title">비품 정보</h1>
            </div>
            <div class="header-actions">
                <button type="button" class="btn-edit" id="btn-edit">
                    <i class="fas fa-edit"></i>
                    수정
                </button>
                <button type="button" class="btn-delete" id="btn-delete">
                    <i class="fas fa-trash-alt"></i>
                    삭제
                </button>
            </div>
        </div>

        <!-- Content Wrapper -->
        <div class="content-wrapper">

            <!-- Left Column: 기본 정보 -->
            <div class="left-column">

                <!-- 기본 정보 섹션 -->
                <section class="info-card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <i class="fas fa-info-circle"></i>
                            기본 정보
                        </h2>
                    </div>

                    <div class="card-body">
                        <div class="info-grid">
                            <!-- 비품명 -->
                            <div class="info-item">
                                <label class="info-label">비품명 <span class="required">*</span></label>
                                <input type="text" class="info-input" id="item-name" placeholder="비품명을 입력하세요"
                                    maxlength="50" />
                                <span class="hint" id="item-name-msg"></span>
                            </div>

                            <!-- 카테고리 -->
                            <div class="info-item">
                                <label class="info-label">카테고리 <span class="required">*</span></label>
                                <select class="info-select" id="item-category">
                                    <option value="">카테고리 선택</option>
                                </select>
                                <span class="hint" id="item-category-msg"></span>
                            </div>

                            <!-- 비품 이미지 업로드 -->
                            <div class="item-image-wrapper">
                                <label class="info-label">비품 이미지 (선택사항)</label>
                                <div class="item-image-upload-container">
                                    <input type="file" id="item-image-input" accept="image/*" style="display: none;">
                                    <div class="item-image-preview" id="item-image-preview">
                                        <img id="item-image" src="" alt="비품 이미지" style="display: none;">
                                        <div class="upload-placeholder" id="upload-placeholder">
                                            <i class="fas fa-cloud-upload-alt"></i>
                                            <p>클릭하여 이미지 업로드</p>
                                            <span class="upload-hint">JPG, PNG (최대 50MB)</span>
                                        </div>
                                    </div>
                                    <div class="upload-actions">
                                        <button type="button" class="btn-remove-img" id="btn-remove-img"
                                            style="display: none;">
                                            <i class="fas fa-trash"></i>
                                            기존 이미지 제거
                                        </button>
                                        <button type="button" class="btn-remove" id="btn-remove" style="display: none;">
                                            <i class="fas fa-trash"></i>
                                            제거
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- 상태 -->
                            <div class="info-item">
                                <label class="info-label">상태 <span class="required">*</span></label>
                                <select class="info-select" id="item-status">
                                    <option value="">상태 선택</option>
                                </select>
                                <span class="hint" id="item-status-msg"></span>
                            </div>
                        </div>

                        <!-- 비고 -->
                        <div class="info-description-wrapper">
                            <label class="info-label">비고</label>
                            <input type="text" class="info-textarea" id="item-description"
                                placeholder="비고 내용을 입력하세요 (선택)" maxlength="50" />
                            <span class="hint" id="item-description-msg"></span>
                        </div>

                        <!-- 등록 정보 -->
                        <div class="creator-info">
                            <div class="creator-item">
                                <i class="fas fa-user"></i>
                                <span class="creator-label">등록자:</span>
                                <span class="creator-value" id="uploader-name">-</span>
                            </div>
                            <div class="creator-item">
                                <i class="fas fa-calendar-alt"></i>
                                <span class="creator-label">등록일:</span>
                                <span class="creator-value" id="created-at">-</span>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

</body>

</html>
