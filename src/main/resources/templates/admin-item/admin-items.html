<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>비품 관리</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-item/admin-items.css}">
    </th:block>
    <!-- ✅ 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-item/admin-items.js}"></script>
    </th:block>
</head>
<body>

<!-- Main Content -->
<div th:fragment="content">
    <div class="page-header">
        <h1 class="page-title">비품 관리</h1>

    </div>

    <!-- Category Filter Section -->
    <div class="category-section">
        <div class="category-select-wrapper">
            <label class="category-label">카테고리</label>
            <select class="category-select" id="item-category-filter">
                <option value="">전체</option>
            </select>
        </div>
        <button type="button" class="btn-category-manage" id="btn-category-manage">
            <i class="fas fa-cog"></i>
            카테고리 관리
        </button>

        <button type="button" class="btn-add">
            <i class="fas fa-plus"></i>
            비품 추가
        </button>
    </div>

    <div class="table-container">
        <table class="resource-table">
            <colgroup>
                <col style="width:5%">
                <col style="width:15%">
                <col style="width:20%">
                <col style="width:40%">
                <col style="width:10%">
                <col style="width:10%">
            </colgroup>
            <thead>
            <tr>
                <th>번호</th>
                <th>카테고리</th>
                <th>비품명</th>
                <th>비고</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-container" id="pagination-container">
        <div class="pagination"></div>
    </div>
</div>

</body>
</html>
