<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/reservation/user-reservation-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>м°Ёлҹү мҳҲм•Ҫ</title>

    <!-- нҺҳмқҙм§Җлі„ CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/reservation/car-reservation.css}">
        <link rel="stylesheet" th:href="@{/css/user-sidebar/user-sidebar.css}">
    </th:block>

    <!-- нҺҳмқҙм§Җлі„ JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/reservation/car-reservation.js}"></script>
    </th:block>
</head>

<body>
<!-- Main Content -->
<div th:fragment="content">
    <div class="page-header">
        <h1 class="page-title">м°Ёлҹү мҳҲм•Ҫ</h1>
    </div>

    <!-- Car Image Section -->
    <div class="car-image-section">
        <img id="selected-car-image" src="" alt="" class="car-image">
    </div>

    <!-- Reservation Grid -->
    <div class="grid-container">
        <div class="grid-inner">
            <div class="grid-header">
                <div class="car-column-header"></div>
                <div class="dates-header" id="dates-header">
                    <!-- JavaScriptлЎң лӮ м§ң н—ӨлҚ” мғқм„ұ -->
                </div>
            </div>
            <div class="grid-body-wrapper">
                <div class="grid-body" id="grid-body">
                    <!-- JavaScriptлЎң к·ёлҰ¬л“ң мғқм„ұ -->
                </div>
            </div>
        </div>
    </div>

    <!-- Reservation Form -->
    <div class="reservation-form-container">
        <div class="reservation-info-grid">
            <div class="info-item">
                <label class="info-label">мӢ мІӯмһҗ</label>
                <div class="info-value" id="applicant-name">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">м°Ёлҹү</label>
                <div class="info-value" id="selected-car-name">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">м°Ёлҹү лІҲнҳё</label>
                <div class="info-value" id="selected-car-number">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">мҡҙм „ к°ҖлҠҘ лӮҳмқҙ</label>
                <div class="info-value" id="selected-car-driver-age">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">л№„кі </label>
                <div class="info-value" id="selected-car-description">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">мӢңмһ‘ лӮ м§ң</label>
                <div class="info-value" id="selected-start-date">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">мў…лЈҢ лӮ м§ң</label>
                <div class="info-value" id="selected-end-date">-</div>
            </div>
        </div>

        <div class="reservation-input-section">
            <div class="input-wrapper">
                <label class="form-label">мӢ мІӯ мӮ¬мң  <span class="required">*</span></label>
                <input type="text"
                       class="form-input"
                       id="reservation-reason"
                       placeholder="мӢ мІӯ мӮ¬мң лҘј мһ…л Ҙн•ҳм„ёмҡ”"
                       maxlength="200">
                <div id="reservation-reason-msg" class="hint"></div>
            </div>
            <button type="button" class="btn-submit" id="btn-submit">
                <i class="fas fa-check"></i>
                мӢ мІӯ
            </button>
        </div>
    </div>
</div>

</body>
</html>
