<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/reservation/user-reservation-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>차량 예약</title>

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/reservation/car-reservation.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/reservation/car-reservation.js}"></script>
    </th:block>
</head>

<body>
<!-- Main Content -->
<div th:fragment="content">
    <div class="page-header">
        <h1 class="page-title">차량 예약</h1>
    </div>

    <!-- Date Selection and Image -->
    <div class="filter-image-wrapper">
        <div class="filter-section">
            <div class="filter-item">
                <label class="filter-label">예약 날짜</label>
                <select class="filter-select" id="reservation-date-select">
                    <!-- JavaScript로 동적 생성 -->
                </select>
            </div>
        </div>
        <div class="car-image-section">
            <img id="selected-car-image" src="" alt="차량 이미지" class="car-image">
        </div>
    </div>

    <!-- Reservation Grid -->
    <div class="grid-container">
        <div class="grid-inner">
            <div class="grid-header">
                <div class="car-column-header"></div>
                <div class="times-header" id="times-header">
                    <!-- JavaScript로 시간 헤더 생성 -->
                </div>
            </div>
            <div class="grid-body-wrapper">
                <div class="grid-body" id="grid-body">
                    <!-- JavaScript로 그리드 생성 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Reservation Form -->
    <div class="reservation-form-container">
        <div class="reservation-info-grid">
            <div class="info-item">
                <label class="info-label">신청자</label>
                <div class="info-value" id="applicant-name">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">차량</label>
                <div class="info-value" id="selected-car-name">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">차량 번호</label>
                <div class="info-value" id="selected-car-number">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">운전 가능 나이</label>
                <div class="info-value" id="selected-car-driver-age">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">비고</label>
                <div class="info-value" id="selected-car-description">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">날짜</label>
                <div class="info-value" id="selected-date">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">시작 시간</label>
                <div class="info-value" id="selected-start-time">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">종료 시간</label>
                <div class="info-value" id="selected-end-time">-</div>
            </div>
        </div>

        <div class="reservation-input-section">
            <div class="input-wrapper">
                <label class="form-label">신청 사유 <span class="required">*</span></label>
                <input type="text"
                       class="form-input"
                       id="reservation-reason"
                       placeholder="신청 사유를 입력하세요"
                       maxlength="255">
            </div>
            <button type="button" class="btn-submit" id="btn-submit">
                <i class="fas fa-check"></i>
                신청
            </button>
        </div>
    </div>
</div>

</body>
</html>
