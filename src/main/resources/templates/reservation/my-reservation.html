<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{::user-sidebar-menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>내 예약 현황</title>

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/reservation/my-reservation.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/reservation/my-reservation.js}"></script>
    </th:block>
</head>

<body>
<!-- Main Content -->
<div th:fragment="content">
    <div class="page-header">
        <h1 class="page-title">내 예약 현황</h1>
    </div>

    <!-- Filter Section -->
    <div class="filter-section">
        <div class="filter-item">
            <label class="filter-label">리소스 카테고리</label>
            <select class="filter-select" id="resource-category-filter">
                <option value="">전체</option>
                <option value="MEETING">회의실</option>
                <option value="CAR">차량</option>
                <option value="ITEM">기타 자원</option>

            </select>
        </div>

        <div class="filter-item">
            <label class="filter-label">상태</label>
            <select class="filter-select" id="status-filter"></select>
        </div>

        <div class="filter-item toggle-wrapper">
            <label class="filter-label">지난 예약 보기</label>
            <label class="toggle-switch">
                <input type="checkbox" id="past-reservations-toggle">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!--        <button type="button" class="btn-search" id="btn-search">-->
        <!--            <i class="fas fa-search"></i>-->
        <!--            검색-->
        <!--        </button>-->
    </div>

    <!-- Table Container -->
    <div class="table-container">
        <table class="resource-table">
            <colgroup>
                <col style="width:5%">
                <col style="width:10%">
                <col style="width:16%">
                <col style="width:30%">
                <col style="width:10%">
                <col style="width:7%">
                <col style="width:7%">
                <col style="width:8%">
                <col style="width:7%">
            </colgroup>
            <thead>
            <tr>
                <th>번호</th>
                <th>카테고리</th>
                <th>이름</th>
                <th>예약 사유</th>
                <th>예약일</th>
                <th>시작시간</th>
                <th>종료시간</th>
                <th>상태</th>
                <th>취소</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination-container" id="pagination-container">
            <div class="pagination"></div>
        </div>
    </div>
</div>

<!-- User Sidebar Menu -->
<ul th:fragment="user-sidebar-menu" class="sidebar-menu">
    <li class="selected">
        <a th:href="@{/view/reservation/me}" class="sidebar-link">
            내 예약 현황
        </a>
    </li>
    <li>
        <a th:href="@{/view/resource/meetingrooms}" class="sidebar-link">
            회의실 예약
        </a>
    </li>
</ul>
</body>
</html>
