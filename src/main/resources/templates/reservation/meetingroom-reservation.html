<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/reservation/user-reservation-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>нҡҢмқҳмӢӨ мҳҲм•Ҫ</title>

    <!-- нҺҳмқҙм§Җлі„ CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/reservation/meetingroom-reservation.css}">
    </th:block>

    <!-- нҺҳмқҙм§Җлі„ JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/reservation/meetingroom-reservation.js}"></script>
    </th:block>
</head>

<body>
<!-- Main Content -->
<div th:fragment="content">
    <div class="page-header">
        <h1 class="page-title">нҡҢмқҳмӢӨ мҳҲм•Ҫ</h1>
    </div>

    <!-- Date Selection -->
    <div class="filter-section">
        <div class="filter-item">
            <label class="filter-label">мҳҲм•Ҫ лӮ м§ң</label>
            <select class="filter-select" id="reservation-date-select">
                <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
            </select>
        </div>
        <button type="button" class="btn-search" id="btn-search">
            <i class="fas fa-search"></i>
            мЎ°нҡҢ
        </button>
    </div>

    <!-- Reservation Grid -->
    <div class="grid-container">
        <div class="grid-header">
            <div class="room-column-header">нҡҢмқҳмӢӨ</div>
            <div class="times-header" id="times-header">
                <!-- JavaScriptлЎң мӢңк°„ н—ӨлҚ” мғқм„ұ -->
            </div>
        </div>
        <div class="grid-body-wrapper">
            <div class="grid-body" id="grid-body">
                <!-- JavaScriptлЎң к·ёлҰ¬л“ң мғқм„ұ -->
            </div>
        </div>
    </div>

    <!-- Reservation Form -->
    <div class="reservation-form-container">
        <div class="reservation-info-grid">
            <div class="info-item">
                <label class="info-label">мӢ мІӯмһҗ</label>
                <div class="info-value" id="applicant-name">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">нҡҢмқҳмӢӨ</label>
                <div class="info-value" id="selected-room-name">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">мң„м№ҳ</label>
                <div class="info-value" id="selected-room-location">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">л№„кі </label>
                <div class="info-value" id="selected-room-description">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">лӮ м§ң</label>
                <div class="info-value" id="selected-date">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">мӢңмһ‘ мӢңк°„</label>
                <div class="info-value" id="selected-start-time">-</div>
            </div>
            <div class="info-item">
                <label class="info-label">мў…лЈҢ мӢңк°„</label>
                <div class="info-value" id="selected-end-time">-</div>
            </div>
        </div>

        <div class="reservation-input-section">
            <div class="input-wrapper">
                <label class="form-label">мӢ мІӯ мӮ¬мң  <span class="required">*</span></label>
                <input type="text"
                       class="form-input"
                       id="reservation-reason"
                       placeholder="мӢ мІӯ мӮ¬мң лҘј мһ…л Ҙн•ҳм„ёмҡ”"
                       maxlength="255">
            </div>
            <button type="button" class="btn-submit" id="btn-submit">
                <i class="fas fa-check"></i>
                мӢ мІӯ
            </button>
        </div>
    </div>
</div>

</body>
</html>
