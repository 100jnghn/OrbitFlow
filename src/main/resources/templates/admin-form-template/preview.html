<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/approval/user-approval-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>결재 양식 미리보기</title>

    <!-- 공통 폰트 -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/user-document/detail.css}">
        <link rel="stylesheet" th:href="@{/css/admin-form-template/preview.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:inline="javascript">
            const templateId = /*[[${templateId}]]*/ null
        </script>
        <script type="module" th:src="@{/js/admin-form-template/preview.js}"></script>
    </th:block>
</head>

<body>

<!-- Main Content -->
<div th:fragment="content">
    <div class="preview-container">

        <!-- 📄 문서 전체 래퍼 -->
        <div class="document-wrapper document-detail-page preview-only">

            <!-- ← 뒤로가기 -->
            <button
                    type="button"
                    class="preview-back-button"
                    onclick="handlePreviewBack()">
                ← 이전 페이지
            </button>

            <!-- 🧾 문서 헤더 (선택) -->
            <div class="document-header">
                <!-- 필요하면 JS로 제목/설명 채움 -->
            </div>

            <!-- 📄 문서 본문 -->
            <div class="document-body">

                <!-- ✅ 상세보기 CSS 핵심 영역 -->
                <div class="document-content-panel">
                    <div id="documentContentContainer">
                        <!-- JS에서 renderDocumentContent 결과 삽입 -->
                    </div>
                </div>

                <!-- ❌ 사이드 패널은 미리보기에서 사용 안 함 -->
                <!-- <div class="document-side-panel"></div> -->

            </div>

            <!-- 푸터 (선택) -->
            <div class="document-footer"></div>

        </div>
    </div>
</div>

</body>
</html>
