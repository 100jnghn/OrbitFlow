<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, headerFragment, sidebarFragment, pageCss, pageScript)">

<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'OrbitFlow'">OrbitFlow</title>

    <!-- Font 및 아이콘 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/notification/notification.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


    <!-- 페이지별 CSS 삽입 위치 -->
    <th:block th:replace="${pageCss}"></th:block>
</head>

<body>

<div class="app-wrapper">

    <!-- Header -->
    <header th:replace="${headerFragment}"></header>

    <div class="app-body">

        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: shell(${sidebarFragment})}"></aside>

        <!-- Main Content -->
        <main class="app-content">
            <th:block th:replace="${content}"></th:block>
        </main>

    </div>
</div>

<!-- 세션 모달 (공통) -->
<div th:replace="~{fragments/session-modal :: body}"></div>

<!-- 알림 모달 (공통) -->
<div th:replace="~{fragments/notification :: body}"></div>

<!-- 공통 JS -->
<!-- Authentication 사용해서 eventSource(sse 연결)을 만드는 라이브러리 -->
<script src="https://unpkg.com/event-source-polyfill/src/eventsource.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/notification/notification.js}"></script>

<!-- ✅ 페이지별 JS 삽입 위치 (이 줄이 핵심) -->
<th:block th:replace="${pageScript}"></th:block>

</body>
</html>
