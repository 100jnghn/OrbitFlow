<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Multi Project'">Multi Project</title>

    <!-- 공통 폰트 / 아이콘 -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100..700&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 공통 레이아웃 스타일 -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>
<div class="app-wrapper">
    <!-- 공통 헤더 -->
    <header th:replace="fragments/header :: header"></header>

    <div class="app-body">
        <!-- 공통 사이드바 디자인 틀 (shell) 안에 팀별 메뉴 fragment 삽입 -->
        <aside th:replace="fragments/sidebar-shell :: shell(${sidebarFragment})"></aside>

        <!-- 페이지별 본문 -->
        <main class="app-content">
            <div th:insert="${content}"></div>
        </main>
    </div>
</div>
</body>
</html>
