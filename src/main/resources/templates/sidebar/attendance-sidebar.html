<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 출석(근태) 영역 전용 사이드바 메뉴: 디자인은 sidebar-shell 에서 관리 -->
<ul th:fragment="menu">
    <li th:classappend="${currentMenu} == 'work' ? ' selected' : ''">
        <a th:href="@{/attendance}" class="sidebar-link">출퇴근</a>
    </li>
    <li th:classappend="${currentMenu} == 'daily' ? ' selected' : ''">
        <a th:href="@{/attendance/daily}" class="sidebar-link">일별 근태 조회</a>
    </li>
    <li th:classappend="${currentMenu} == 'history' ? ' selected' : ''">
        <a th:href="@{/attendance/history}" class="sidebar-link">출퇴근 조회</a>
    </li>

    <li class="sidebar-section-title">휴가 신청</li>
    <li th:classappend="${currentMenu} == 'vacation-apply' ? ' selected' : ''">
        <a th:href="@{/attendance/vacation/apply}" class="sidebar-link">휴가 신청서 작성</a>
    </li>
    <li th:classappend="${currentMenu} == 'vacation-status' ? ' selected' : ''">
        <a th:href="@{/attendance/vacation/status}" class="sidebar-link">휴가 신청 현황</a>
    </li>
</ul>
</body>
</html>
