<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 출석(근태) 영역 전용 사이드바 메뉴: 디자인은 sidebar-shell 에서 관리 -->
<ul th:fragment="menu">
    <li class="sidebar-section-title">MY 근태</li>
    <li th:classappend="${currentMenu} == 'commute' ? ' selected' : ''">
        <a th:href="@{/view/attendance/commute}" class="sidebar-link">출퇴근</a>
    </li>
    <li th:classappend="${currentMenu} == 'monthly' ? ' selected' : ''">
        <a th:href="@{/view/attendance/monthly}" class="sidebar-link">월별 근태 조회</a>
    </li>
    <li th:classappend="${currentMenu} == 'annual-leave' ? ' selected' : ''">
        <a th:href="@{/attendance/annual-leave}" class="sidebar-link">내 연차 조회</a>
    </li>

    <li class="sidebar-section-title">휴가 신청</li>
    <li th:classappend="${currentMenu} == 'vacation-apply' ? ' selected' : ''">
        <a th:href="@{/attendance/vacation/apply}" class="sidebar-link">휴가 신청서 작성</a>
    </li>
    <li th:classappend="${currentMenu} == 'vacation-status' ? ' selected' : ''">
        <a th:href="@{/attendance/vacation/status}" class="sidebar-link">휴가 신청 현황</a>
    </li>
</ul>
</body>
</html>
