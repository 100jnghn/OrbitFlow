<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 사이드바 메뉴 -->
<th:block th:fragment="sidebar">
    <ul class="sidebar-menu">
        <li class="menu-item no-sub">
            <a th:href="@{/view/reservation/me}" class="sidebar-link" id="myReservationLink">
                나의 예약 현황
            </a>
        </li>
        <li class="menu-item active">
            <div class="menu-title" role="button" onclick="toggleReservationMenu(this)" aria-expanded="true">
                <span>자원 예약</span>
                <i class="fas fa-chevron-down arrow"></i>
            </div>
            <ul class="sub-menu">
                <li>
                    <a th:href="@{/view/reservation/meetingroom}" class="sidebar-link" id="meetingRoomLink">
                        회의실 예약
                    </a>
                </li>
                <li>
                    <a th:href="@{/view/reservation/car}" class="sidebar-link" id="carLink">
                        차량 예약
                    </a>
                </li>
                <li>
                    <a th:href="@{/view/reservation/item}" class="sidebar-link" id="otherResourceLink">
                        기타 자원 예약
                    </a>
                </li>
            </ul>
        </li>
    </ul>
    <script>
        // 자원 예약 아코디언 토글 함수
        function toggleReservationMenu(element) {
            const menuItem = element.closest('.menu-item');
            if (!menuItem) return;

            const isOpen = menuItem.classList.contains('active');

            // 다른 메뉴 닫기
            document.querySelectorAll('.sidebar-menu .menu-item').forEach(item => {
                if (item !== menuItem) {
                    item.classList.remove('active');
                    const title = item.querySelector('.menu-title');
                    if (title) title.setAttribute('aria-expanded', 'false');
                }
            });

            // 현재 메뉴 토글
            if (isOpen) {
                menuItem.classList.remove('active');
                element.setAttribute('aria-expanded', 'false');
            } else {
                menuItem.classList.add('active');
                element.setAttribute('aria-expanded', 'true');
            }
        }
    </script>
</th:block>
</body>
</html>
