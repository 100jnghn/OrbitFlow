<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>예약 관리</title>

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-reservation/admin-reservations.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-reservation/admin-reservations.js}"></script>
    </th:block>

    <!-- 사이드바 메뉴 -->
    <th:block th:fragment="sidebar">
        <ul class="sidebar-menu" id="boardSidebar">
            <!-- 동적으로 로드됨 -->
        </ul>
    </th:block>
</head>

<body>
<!-- Main Content -->
<div th:fragment="content">
    <div class="board-container">
        <div class="page-header">
            <h1 class="page-title">예약 관리</h1>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label class="filter-label">리소스 카테고리</label>
                <select class="filter-select" id="resource-category-filter">
                    <option value="">전체</option>
                    <option value="MEETING">회의실</option>
                    <option value="CAR">차량</option>
                    <option value="ITEM">기타 자원</option>
                </select>
            </div>

            <div class="filter-item">
                <label class="filter-label">상태</label>
                <select class="filter-select" id="status-filter"></select>
            </div>

            <div class="filter-item toggle-wrapper">
                <label class="filter-label">지난 예약 보기</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="past-reservations-toggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- 일괄 승인 버튼 -->
            <div class="filter-item batch-approve-wrapper" id="batch-approve-wrapper" style="display: none;">
                <button type="button" class="btn-batch-approve" id="btn-batch-approve">
                    일괄 승인
                </button>
            </div>
        </div>

        <!-- Table Container -->
        <div class="board-table-container">
            <table class="resource-table">
                <colgroup>
                    <col style="width:5%">
                    <col style="width:8%">
                    <col style="width:8%">
                    <col style="width:15%">
                    <col style="width:18%">
                    <col style="width:8%">
                    <col style="width:8%">
                    <col style="width:7%">
                    <col style="width:7%">
                    <col style="width:9%">
                    <col style="width:7%">
                </colgroup>
                <thead>
                <tr>
                    <th>번호</th>
                    <th>카테고리</th>
                    <th>신청자</th>
                    <th>자원 이름</th>
                    <th>예약 사유</th>
                    <th>시작일</th>
                    <th>종료일</th>
                    <th>시작시간</th>
                    <th>종료시간</th>
                    <th>상태</th>
                    <th>승인</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container" id="pagination-container">
            <div class="pagination"></div>
        </div>

    <!-- Status Reason Modal -->
    <div id="status-reason-modal" class="status-reason-modal" style="display: none;">
        <div class="status-reason-modal-content">
            <div class="status-reason-modal-title" id="status-reason-modal-title">사유 입력</div>
            <div class="status-reason-modal-form-group">
                <label for="status-reason-input" id="status-reason-label">사유</label>
                <textarea id="status-reason-input" class="status-reason-textarea" placeholder="사유를 입력해주세요." maxlength="255"></textarea>
                <div class="status-reason-hint" id="status-reason-hint"></div>
            </div>
            <div class="status-reason-modal-actions">
                <button type="button" class="status-reason-modal-cancel-btn" id="status-reason-modal-cancel">취소</button>
                <button type="button" class="status-reason-modal-submit-btn" id="status-reason-modal-submit">확인</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
