<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="shell(sidebarFragment)" class="sidebar">
    <div class="sidebar-inner">
        <div class="sidebar-title">
            <i class="fas fa-desktop sidebar-logo-icon"></i>
            <span th:text="${companyName} ?: '엠터캠피스'">엠터캠피스</span>
        </div>

        <div class="sidebar-menu-wrapper">
            <!-- 각 팀/도메인에서 정의한 메뉴 fragment 가 이 안으로 주입됨 -->
            <ul class="sidebar-menu" th:replace="${sidebarFragment}"></ul>
        </div>

        <div class="sidebar-footer">
            <p>사용자 전용 공지사항이나 안내 문구를 표시할 수 있습니다.</p>
        </div>
    </div>
</nav>
</body>
</html>
