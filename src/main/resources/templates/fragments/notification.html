<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 알림 모달 -->
<div th:fragment="body">
<div id="notificationModal" class="notification-modal hidden">
    <div class="notification-modal-backdrop" onclick="closeNotificationModal()"></div>
    <div class="notification-modal-panel">
        <div class="notification-modal-head">
            <h2>알림</h2>
            <button class="notification-modal-close-btn" onclick="closeNotificationModal()">✕</button>
        </div>
        
        <div class="notification-modal-tabs">
            <button class="notification-tab" id="unreadTab" onclick="switchTab('unread')">읽지 않음</button>
            <button class="notification-tab" id="readTab" onclick="switchTab('read')">읽음</button>
        </div>
        
        <div class="notification-modal-body" id="notificationList">
            <!-- 알림 목록이 여기에 동적으로 추가됩니다 -->
        </div>
    </div>
</div>
</div>

</body>
</html>
