<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{::sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title>내 일정</title>

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/schedule/schedule.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/schedule/schedule.js}"></script>
    </th:block>

    <!-- 사이드바 메뉴 -->
    <th:block th:fragment="sidebar">
        <ul class="sidebar-menu" id="boardSidebar">
            <!-- 동적으로 로드됨 -->
        </ul>
    </th:block>
</head>
<body>
<div th:fragment="content">
    <div class="board-container">
        <!-- 게시판 제목 -->
        <div class="board-header">
            <h1>일정 관리</h1>
        </div>

        <!-- 일정 요약 -->
        <div class="schedule-summary">
            <div class="summary-card">
                <div class="summary-icon">
                    <i class="fas fa-calendar-day"></i>
                </div>
                <div class="summary-content">
                    <div class="summary-label">오늘 일정</div>
                    <div class="summary-value" id="todayCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">
                    <i class="fas fa-calendar-week"></i>
                </div>
                <div class="summary-content">
                    <div class="summary-label">이번 주 일정</div>
                    <div class="summary-value" id="weekCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div class="summary-content">
                    <div class="summary-label">이번 달 일정</div>
                    <div class="summary-value" id="monthCount">0</div>
                </div>
            </div>
        </div>

        <!-- 필터 및 컨트롤 -->
        <div class="schedule-controls">
            <div class="filter-section">
                <div class="filter-group">
                    <label class="filter-label">조직</label>
                    <div id="orgFilter" class="org-filter-checkbox-list">
                        <!-- 조직 목록은 JavaScript에서 동적으로 로드 -->
                    </div>
                </div>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn active" id="personalToggle" data-type="personal">
                        개인
                    </button>
                    <button type="button" class="toggle-btn active" id="companyToggle" data-type="company">
                        전사
                    </button>
                </div>
            </div>
            <div class="control-buttons">
                <button type="button" class="btn-today" id="todayBtn">오늘</button>
                <button type="button" class="btn-add-schedule" id="addScheduleBtn">
                    <i class="fas fa-plus"></i> 일정 추가
                </button>
            </div>
        </div>

        <!-- 캘린더 및 일정 목록 -->
        <div class="schedule-main-content">
            <!-- 캘린더 -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <button type="button" class="btn-nav" id="prevMonthBtn">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h2 class="calendar-month-year" id="calendarMonthYear">2024년 1월</h2>
                    <button type="button" class="btn-nav" id="nextMonthBtn">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="calendar-wrapper">
                    <div class="day-header">
                        <div class="day-name">일</div>
                        <div class="day-name">월</div>
                        <div class="day-name">화</div>
                        <div class="day-name">수</div>
                        <div class="day-name">목</div>
                        <div class="day-name">금</div>
                        <div class="day-name">토</div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- 캘린더 날짜는 JavaScript에서 동적으로 생성 -->
                    </div>
                </div>
            </div>

            <!-- 일정 목록 -->
            <div class="schedule-list-section">
                <h3 class="list-title">일정 목록</h3>
                <div class="schedule-list" id="scheduleList">
                    <!-- 일정 목록은 JavaScript에서 동적으로 생성 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 일정 추가 모달 -->
    <div id="scheduleModal" class="modal">
        <div class="modal-content schedule-modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">일정 등록</h3>
                <span class="close" onclick="closeScheduleModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="scheduleForm">
                    <input type="hidden" id="scheduleId" name="scheduleId">
                    <!-- 제목 -->
                    <div class="form-group">
                        <label for="scheduleTitle" class="form-label">
                            제목 <span class="char-count" id="titleCharCount">(0/20)</span> <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="scheduleTitle"
                               name="title"
                               class="form-input"
                               placeholder="일정 제목을 입력하세요"
                               maxlength="20"
                               required>
                        <span class="error-message" id="titleError"></span>
                    </div>
                    <!-- 설명 -->
                    <div class="form-group">
                        <label for="scheduleDescription" class="form-label">
                            설명 <span class="char-count" id="descriptionCharCount">(0/200)</span>
                        </label>
                        <textarea id="scheduleDescription"
                                  name="description"
                                  class="form-input"
                                  placeholder="일정 설명을 입력하세요 (선택)"
                                  maxlength="200"
                                  rows="3"></textarea>
                        <span class="error-message" id="descriptionError"></span>
                    </div>
                    <!-- 날짜/시간 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="scheduleStartDate" class="form-label">
                                시작 날짜 <span class="required">*</span>
                            </label>
                            <input type="date"
                                   id="scheduleStartDate"
                                   name="startDate"
                                   class="form-input"
                                   required>
                        </div>
                        <div class="form-group time-group">
                            <label class="form-label">
                                시작 시간 <span class="required">*</span>
                            </label>
                            <div class="time-select-wrapper">
                                <select id="scheduleStartHour" name="startHour" class="form-input time-select" required></select>
                                <span class="time-separator">:</span>
                                <select id="scheduleStartMinute" name="startMinute" class="form-input time-select" required></select>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="scheduleEndDate" class="form-label">
                                종료 날짜 <span class="required">*</span>
                            </label>
                            <input type="date"
                                   id="scheduleEndDate"
                                   name="endDate"
                                   class="form-input"
                                   required>
                        </div>
                        <div class="form-group time-group">
                            <label class="form-label">
                                종료 시간 <span class="required">*</span>
                            </label>
                            <div class="time-select-wrapper">
                                <select id="scheduleEndHour" name="endHour" class="form-input time-select" required></select>
                                <span class="time-separator">:</span>
                                <select id="scheduleEndMinute" name="endMinute" class="form-input time-select" required></select>
                            </div>
                        </div>
                    </div>
                    <!-- 개인일정 체크박스 -->
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="isPersonalSchedule" class="checkbox-input">
                            <span>개인일정</span>
                        </label>
                    </div>
                    <!-- 조직 -->
                    <div class="form-group">
                        <label for="scheduleOrg" class="form-label">조직</label>
                        <select id="scheduleOrg"
                                name="orgId"
                                class="form-input">
                            <option value="">선택 안 함</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeScheduleModal()">취소</button>
                        <button type="submit" class="btn-submit" id="submitBtn">등록</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 일정 세부 정보 모달 -->
    <div id="scheduleDetailModal" class="modal">
        <div class="modal-content schedule-modal-content">
            <div class="modal-header">
                <h3>일정 세부 정보</h3>
                <span class="close" onclick="closeScheduleDetailModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="schedule-detail-content">
                    <div class="detail-group">
                        <label class="detail-label">제목</label>
                        <div class="detail-value" id="detailTitle"></div>
                    </div>
                    <div class="detail-group">
                        <label class="detail-label">설명</label>
                        <div class="detail-value" id="detailDescription">-</div>
                    </div>
                    <div class="detail-group">
                        <label class="detail-label">시작 일시</label>
                        <div class="detail-value" id="detailStartAt"></div>
                    </div>
                    <div class="detail-group">
                        <label class="detail-label">종료 일시</label>
                        <div class="detail-value" id="detailEndAt"></div>
                    </div>
                    <div class="detail-group">
                        <label class="detail-label">상태</label>
                        <div class="detail-value" id="detailStatus"></div>
                    </div>
                    <div class="detail-group">
                        <label class="detail-label">일정 유형</label>
                        <div class="detail-value" id="detailType"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeScheduleDetailModal()">닫기</button>
                    <button type="button" class="btn-delete" id="detailDeleteBtn">삭제</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
