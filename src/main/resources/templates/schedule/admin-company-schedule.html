<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>м „мӮ¬ мқјм • кҙҖлҰ¬</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- нҺҳмқҙм§Җлі„ CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/schedule/admin-company-schedule.css}">
    </th:block>

    <!-- нҺҳмқҙм§Җлі„ JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/schedule/admin-company-schedule.js}"></script>
    </th:block>
</head>
<body>

<!-- Main Content -->
<div th:fragment="content">
    <div class="schedule-container">
        <!-- н—ӨлҚ” м„№м…ҳ -->
        <div class="schedule-header">
            <h1 class="page-title">м „мӮ¬ мқјм • кҙҖлҰ¬</h1>
            
            <!-- н•„н„° л°Ҹ л„Өл№„кІҢмқҙм…ҳ -->
            <div class="header-controls">
                <!-- мғҒнғң н•„н„° -->
                <div class="filter-group">
                    <label for="statusFilter" class="filter-label">мғҒнғң</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="ALL">м „мІҙ</option>
                        <option value="RELEASE">кіөк°ң</option>
                        <option value="HOLD">ліҙлҘҳ</option>
                    </select>
                </div>

                <!-- мӣ” л„Өл№„кІҢмқҙм…ҳ -->
                <div class="month-navigation">
                    <button type="button" class="nav-btn" id="prevMonth">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="current-month" id="currentMonthDisplay">
                        2024л…„ 12мӣ”
                    </div>
                    <button type="button" class="nav-btn" id="nextMonth">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <!-- мҳӨлҠҳлЎң мқҙлҸҷ -->
                <button type="button" class="btn-today" id="btnToday">
                    мҳӨлҠҳ
                </button>

                <!-- мқјм • л“ұлЎқ -->
                <button type="button" class="btn-add-schedule" id="btnAddSchedule">
                    <i class="fas fa-plus"></i>
                    мқјм • л“ұлЎқ
                </button>
            </div>
        </div>

        <!-- мәҳлҰ°лҚ” м„№м…ҳ -->
        <div class="calendar-wrapper">
            <!-- мҡ”мқј н—ӨлҚ” -->
            <div class="calendar-header">
                <div class="day-header">мқј</div>
                <div class="day-header">мӣ”</div>
                <div class="day-header">нҷ”</div>
                <div class="day-header">мҲҳ</div>
                <div class="day-header">лӘ©</div>
                <div class="day-header">кёҲ</div>
                <div class="day-header">нҶ </div>
            </div>

            <!-- мәҳлҰ°лҚ” к·ёлҰ¬л“ң -->
            <div class="calendar-grid" id="calendarGrid">
                <!-- мқјм •мқҙ лҸҷм ҒмңјлЎң л ҢлҚ”л§Ғлҗ©лӢҲлӢӨ -->
            </div>
        </div>

        <!-- мқјм • лӘ©лЎқ м„№м…ҳ (м„ нғқм Ғ) -->
        <div class="schedule-list-section">
            <h2 class="section-title">мқјм • лӘ©лЎқ</h2>
            <div class="schedule-list" id="scheduleList">
                <!-- мқјм • лӘ©лЎқмқҙ лҸҷм ҒмңјлЎң л ҢлҚ”л§Ғлҗ©лӢҲлӢӨ -->
            </div>
        </div>
    </div>

    <!-- мқјм • л“ұлЎқ лӘЁлӢ¬ -->
    <div id="scheduleModal" class="modal">
        <div class="modal-content schedule-modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">мқјм • л“ұлЎқ</h3>
                <span class="close" onclick="closeScheduleModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="scheduleForm">
                    <!-- м ңлӘ© -->
                    <div class="form-group">
                        <label for="scheduleTitle" class="form-label">
                            м ңлӘ© <span class="required">*</span>
                            <span class="char-count" id="titleCharCount">(0/20)</span>
                        </label>
                        <input type="text" 
                               id="scheduleTitle" 
                               name="title" 
                               class="form-input" 
                               placeholder="мқјм • м ңлӘ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”"
                               maxlength="20"
                               required>
                        <span class="error-message" id="titleError"></span>
                    </div>

                    <!-- м„ӨлӘ… -->
                    <div class="form-group">
                        <label for="scheduleDescription" class="form-label">
                            м„ӨлӘ… <span class="char-count" id="descriptionCharCount">(0/200)</span>
                        </label>
                        <textarea id="scheduleDescription" 
                                  name="description" 
                                  class="form-input" 
                                  placeholder="мқјм • м„ӨлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ” (м„ нғқ)"
                                  maxlength="200"
                                  rows="3"></textarea>
                        <span class="error-message" id="descriptionError"></span>
                    </div>

                    <!-- лӮ м§ң/мӢңк°„ -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="scheduleStartDate" class="form-label">
                                мӢңмһ‘ лӮ м§ң <span class="required">*</span>
                            </label>
                            <input type="date" 
                                   id="scheduleStartDate" 
                                   name="startDate" 
                                   class="form-input" 
                                   required>
                        </div>
                        <div class="form-group time-group">
                            <label class="form-label">
                                мӢңмһ‘ мӢңк°„ <span class="required">*</span>
                            </label>
                            <div class="time-select-wrapper">
                                <select id="scheduleStartHour" 
                                        name="startHour" 
                                        class="form-input time-select" 
                                        required>
                                    <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                                </select>
                                <span class="time-separator">:</span>
                                <select id="scheduleStartMinute" 
                                        name="startMinute" 
                                        class="form-input time-select" 
                                        required>
                                    <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="scheduleEndDate" class="form-label">
                                мў…лЈҢ лӮ м§ң <span class="required">*</span>
                            </label>
                            <input type="date" 
                                   id="scheduleEndDate" 
                                   name="endDate" 
                                   class="form-input" 
                                   required>
                        </div>
                        <div class="form-group time-group">
                            <label class="form-label">
                                мў…лЈҢ мӢңк°„ <span class="required">*</span>
                            </label>
                            <div class="time-select-wrapper">
                                <select id="scheduleEndHour" 
                                        name="endHour" 
                                        class="form-input time-select" 
                                        required>
                                    <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                                </select>
                                <span class="time-separator">:</span>
                                <select id="scheduleEndMinute" 
                                        name="endMinute" 
                                        class="form-input time-select" 
                                        required>
                                    <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- мғҒнғң -->
                    <div class="form-group">
                        <label for="scheduleStatus" class="form-label">
                            мғҒнғң <span class="required">*</span>
                        </label>
                        <select id="scheduleStatus" 
                                name="status" 
                                class="form-input" 
                                required>
                            <option value="RELEASE">кіөк°ң</option>
                            <option value="HOLD">ліҙлҘҳ</option>
                        </select>
                    </div>

                    <!-- мЎ°м§Ғ м№ҙн…Ңкі лҰ¬ (кі м •: нҡҢмӮ¬) -->
                    <div class="form-group">
                        <label for="scheduleOrgCategory" class="form-label">мЎ°м§Ғ м№ҙн…Ңкі лҰ¬</label>
                        <select id="scheduleOrgCategory" 
                                name="orgCategoryId" 
                                class="form-input"
                                disabled>
                            <option value="" id="companyCategoryOption">нҡҢмӮ¬</option>
                        </select>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeScheduleModal()">м·ЁмҶҢ</button>
                        <button type="submit" class="btn-submit" id="submitBtn">л“ұлЎқ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
