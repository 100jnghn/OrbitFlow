<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>결재 양식 관리</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- inbox 스타일 CSS 사용 -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/user-document/inbox.css}">
        <!-- 기존 admin CSS도 유지 -->
        <link rel="stylesheet" th:href="@{/css/admin-approval/home.css}">
    </th:block>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-approval/home.js}" defer></script>
    </th:block>
</head>

<body>

<div th:fragment="content">

    <!-- inbox 스타일 최상위 컨테이너 -->
    <div class="approval-container">

        <!-- =========================
             상단 제목
        ========================== -->
        <div class="approval-header">
            <h1>결재 양식 관리</h1>
        </div>

        <!-- =========================
             검색 / 필터 영역 (inbox 스타일)
        ========================== -->
        <div class="approval-search-section">
            <div class="approval-search-filters">

                <!-- 기존 header-left -->
                <div class="header-left">
                    <button type="button"
                            class="primary-btn"
                            id="createTemplateBtn">
                        결재 양식 생성
                    </button>

                    <button type="button"
                            class="secondary-btn"
                            id="updateTemplateBtn">
                        결재 양식 업데이트
                    </button>
                </div>

                <!-- 기존 header-right -->
                <div class="header-right">
                    <select id="statusFilter" class="status-filter-select">
                        <option value="">상태 필터</option>
                        <option value="DRAFT">임시 저장</option>
                        <option value="ACTIVE">활성</option>
                        <option value="INACTIVE">비활성</option>
                    </select>

                    <select id="categoryFilter" class="status-filter-select">
                        <option value="">카테고리 필터</option>
                        <option value="GENERAL">일반</option>
                        <option value="SCHEDULE">일정</option>
                        <option value="ATTENDANCE">근태</option>
                    </select>

                    <div class="search-group">
                        <input
                                type="text"
                                id="keywordInput"
                                class="search-input"
                                placeholder="양식명으로 검색"
                        />
                        <div class="hint"></div>
                    </div>

                    <button type="button"
                            id="searchBtn"
                            class="search-btn">
                        검색
                    </button>
                </div>

            </div>
        </div>

        <!-- =========================
             테이블 영역 (inbox 스타일)
        ========================== -->
        <div class="approval-table-container">
            <table class="approval-table">
                <colgroup>
                    <col class="col-title">
                    <col class="col-category">
                    <col class="col-version">
                    <col class="col-usedoc">
                    <col class="col-updated">
                    <col class="col-attend">
                    <col class="col-schedule">
                    <col class="col-status">
                </colgroup>

                <thead>
                <tr>
                    <th>양식명</th>
                    <th>카테고리</th>
                    <th>버전</th>
                    <th>사용 문서 수</th>
                    <th>최종 수정일</th>
                    <th>근태 연동</th>
                    <th>일정 연동</th>
                    <th>상태</th>
                </tr>
                </thead>

                <tbody id="approvalTableBody"></tbody>
            </table>

            <div id="approvalTableEmpty"
                 class="approval-empty-row">
                해당하는 양식이 없습니다.
            </div>
        </div>

        <!-- =========================
             페이지네이션 (inbox 스타일)
        ========================== -->
        <div class="approval-bottom-actions">
            <div class="approval-pagination" id="approvalPagination"></div>
        </div>
    </div>
    <!-- =====================
         생성 팝업 (기존 유지)
    ====================== -->
    <div id="createPopup"
         class="modal-backdrop"
         style="display:none;">
        <div class="modal-content">
            <div class="modal-title">새 문서 양식 생성</div>

            <div class="modal-form-group">
                <label for="popupTemplateName">문서 양식 이름</label>
                <input type="text"
                       id="popupTemplateName"
                       class="modal-input"/>
                <div class="hint"></div>
            </div>

            <div class="modal-form-group">
                <label for="popupTemplateDesc">문서 양식 설명</label>
                <textarea
                        id="popupTemplateDesc"
                        class="modal-textarea"
                        rows="3"></textarea>
                <div class="hint"></div>
            </div>

            <div class="modal-form-group">
                <label for="popupCategory">카테고리</label>
                <select id="popupCategory" class="modal-select">
                    <option value="">선택하세요</option>
                    <option value="GENERAL">일반</option>
                    <option value="SCHEDULE">일정</option>
                    <option value="ATTENDANCE">근태</option>
                </select>
                <div class="hint"></div>
            </div>

            <div class="modal-form-group">
                <label for="popupBaseRole">일정 유형</label>
                <select id="popupBaseRole"
                        class="modal-select"
                        disabled>
                    <option value="">선택하세요</option>
                    <option value="VACATION">휴가</option>
                    <option value="BUSINESS_TRIP">출장</option>
                    <option value="OUTWORK">외근</option>
                    <option value="COMPANY_EVENT">회사 일정</option>
                </select>
                <div class="hint"></div>
            </div>

            <div class="modal-actions">
                <button type="button"
                        class="modal-cancel-btn"
                        id="popupCancelBtn">취소
                </button>
                <button type="button"
                        class="modal-create-btn"
                        id="popupCreateBtn">작성
                </button>
            </div>
        </div>
    </div>

    <!-- =====================
         업데이트 팝업 (기존 유지)
    ====================== -->
    <div id="updatePopup"
         class="modal-backdrop"
         style="display:none;">
        <div class="modal-content">

            <div class="modal-title-row">
                <div class="modal-title">문서 양식 업데이트</div>

                <div class="toggle-row">
                    <span class="toggle-label">양식 그룹 활성</span>
                    <label class="switch">
                        <input type="checkbox"
                               id="groupStatusToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="modal-form-group">
                <label for="updateTemplateSearch">검색할 양식 이름</label>
                <input type="text"
                       id="updateTemplateSearch"
                       class="modal-input"/>
                <div class="hint"
                     id="updateTemplateSearchHint"></div>
                <div id="updateDropdown"
                     class="modal-dropdown-list"></div>
            </div>

            <div class="modal-form-group">
                <label>양식 설명</label>
                <div class="update-descbox">
                    <div id="updateSelectedDescText"
                         class="update-desc-text"
                         contenteditable="false">
                        선택된 양식의 설명이 표시됩니다.
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button id="popupUpdateCancelBtn"
                        class="update-btn cancel">취소
                </button>

                <button id="popupEditBtn"
                        class="update-btn secondary">수정
                </button>

                <button id="popupUpdateOkBtn"
                        class="update-btn primary">업데이트
                </button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
