<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/attendance-sidebar :: menu}
      )}">
<div th:fragment="content">
    <style>
        /* мӣ”лі„ к·јнғң мЎ°нҡҢ нҺҳмқҙм§Җ м „мҡ© мҠӨнғҖмқј */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .month-selector label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .month-selector select {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
        }

        /* мӣ”лі„ мҡ”м•Ҫ м№ҙл“ң */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .summary-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 32px;
            font-weight: 700;
        }

        .summary-value.work-hours {
            color: #5687ef;
        }

        .summary-value.late-count {
            color: #ff9800;
        }

        .summary-value.leave-count {
            color: #dc3545;
        }

        /* н…Ңмқҙлё” мҳҒм—ӯ */
        .table-container {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .table-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .filter-select {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: #28a745;
            color: #fff;
        }

        .action-btn.primary:hover {
            background: #218838;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 12px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 12px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .date-cell {
            font-weight: 500;
        }

        .time-cell {
            font-family: 'Roboto Mono', monospace;
        }

        .time-cell.late {
            color: #ff9800;
            font-weight: 600;
        }

        .time-cell.missing {
            color: #999;
            font-style: italic;
        }

        .status-cell {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-cell.request {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-cell.completed {
            background: #e8f5e9;
            color: #388e3c;
        }

        .row-warning {
            background: #fff3cd !important;
        }

        .row-error {
            background: #f8d7da !important;
        }

        /* нҺҳмқҙм§Җл„Өмқҙм…ҳ */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: #f0f0f0;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #5687ef;
            color: #fff;
            border-color: #5687ef;
        }

        .pagination .page-numbers {
            display: flex;
            gap: 4px;
        }
    </style>

    <div style="padding: 24px 40px;">
        <div class="page-header">
            <h1 class="page-title">мӣ”лі„ к·јнғң мЎ°нҡҢ</h1>
            <div class="month-selector">
                <label>мЎ°нҡҢ мӣ”:</label>
                <select id="monthSelect">
                    <option value="2025-12">2025л…„ 12мӣ”</option>
                    <option value="2025-11">2025л…„ 11мӣ”</option>
                    <option value="2025-10">2025л…„ 10мӣ”</option>
                </select>
            </div>
        </div>

        <!-- мӣ”лі„ мҡ”м•Ҫ м№ҙл“ң -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-label">мҙқ к·јл¬ҙ мӢңк°„ (лҲ„м Ғ)</div>
                <div class="summary-value work-hours" id="totalWorkHours">152 мӢңк°„</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">м§Җк°Ғ нҡҹмҲҳ</div>
                <div class="summary-value late-count" id="lateCount">2 нҡҢ</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">нңҙк°Җ/кІ°к·ј мқјмҲҳ</div>
                <div class="summary-value leave-count" id="leaveCount">3 мқј</div>
            </div>
        </div>

        <!-- мқјлі„ мғҒм„ё н…Ңмқҙлё” -->
        <div class="table-container">
            <div class="table-header">
                <h2 style="font-size: 18px; font-weight: 600; color: #333;">мқјлі„ мғҒм„ё кё°лЎқ</h2>
                <div class="table-actions">
                    <select class="filter-select" id="statusFilter">
                        <option value="all">м „мІҙ</option>
                        <option value="normal">м •мғҒ</option>
                        <option value="late">м§Җк°Ғ</option>
                        <option value="early">мЎ°нҮҙ</option>
                        <option value="absent">кІ°к·ј</option>
                    </select>
                    <button class="action-btn primary" id="requestBtn">мҡ”мІӯ</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>лӮ м§ң</th>
                        <th>м¶ңк·ј мӢңк°Ғ</th>
                        <th>нҮҙк·ј мӢңк°Ғ</th>
                        <th>к·јл¬ҙ мӢңк°„</th>
                        <th>мҲҳм •</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <!-- лҚ°мқҙн„°лҠ” JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                </tbody>
            </table>
            <div class="pagination" id="pagination">
                <!-- нҺҳмқҙм§Җл„Өмқҙм…ҳмқҖ JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
            </div>
        </div>
    </div>

    <script>
        // API кё°ліё URL
        const API_BASE_URL = '/api/attendance';
        const CURRENT_COMPANY_ID = 1;
        const CURRENT_EMPLOYEE_ID = 1;

        // м „м—ӯ ліҖмҲҳ
        let currentMonth = '2025-12';
        let currentPage = 1;
        const itemsPerPage = 10;

        // нҺҳмқҙм§Җ лЎңл“ң мӢң мҙҲкё°нҷ”
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('monthSelect').addEventListener('change', handleMonthChange);
            document.getElementById('statusFilter').addEventListener('change', loadAttendanceData);
            loadAttendanceData();
        });

        // мӣ” ліҖкІҪ мІҳлҰ¬
        function handleMonthChange() {
            currentMonth = document.getElementById('monthSelect').value;
            currentPage = 1;
            loadAttendanceData();
        }

        // к·јнғң лҚ°мқҙн„° лЎңл“ң
        async function loadAttendanceData() {
            try {
                const [year, month] = currentMonth.split('-');
                const response = await fetch(`${API_BASE_URL}/monthly?year=${year}&month=${month}&page=${currentPage}&size=${itemsPerPage}`);
                
                if (!response.ok) {
                    throw new Error('к·јнғң лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨлҠ”лҚ° мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.');
                }

                const data = await response.json();
                updateSummary(data.summary);
                updateTable(data.records);
                updatePagination(data.totalPages);
            } catch (error) {
                console.error('Error loading attendance data:', error);
                // мһ„мӢң лҚ°мқҙн„°лЎң н‘ңмӢң
                displaySampleData();
            }
        }

        // мҡ”м•Ҫ м •ліҙ м—…лҚ°мқҙнҠё
        function updateSummary(summary) {
            if (summary) {
                document.getElementById('totalWorkHours').textContent = `${summary.totalWorkHours || 0} мӢңк°„`;
                document.getElementById('lateCount').textContent = `${summary.lateCount || 0} нҡҢ`;
                document.getElementById('leaveCount').textContent = `${summary.leaveCount || 0} мқј`;
            }
        }

        // н…Ңмқҙлё” м—…лҚ°мқҙнҠё
        function updateTable(records) {
            const tbody = document.getElementById('attendanceTableBody');
            tbody.innerHTML = '';

            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.</td></tr>';
                return;
            }

            records.forEach(record => {
                const row = createTableRow(record);
                tbody.appendChild(row);
            });
        }

        // н…Ңмқҙлё” н–ү мғқм„ұ
        function createTableRow(record) {
            const tr = document.createElement('tr');
            
            // лӮ м§ң
            const dateCell = document.createElement('td');
            dateCell.className = 'date-cell';
            dateCell.textContent = formatDate(record.workDate);
            tr.appendChild(dateCell);

            // м¶ңк·ј мӢңк°Ғ
            const commuteCell = document.createElement('td');
            commuteCell.className = 'time-cell';
            if (record.commuteAt) {
                const commuteTime = new Date(record.commuteAt);
                const timeStr = formatTime(commuteTime);
                commuteCell.textContent = timeStr;
                if (record.status === 'LATE') {
                    commuteCell.classList.add('late');
                }
            } else {
                commuteCell.textContent = '-';
                commuteCell.classList.add('missing');
            }
            tr.appendChild(commuteCell);

            // нҮҙк·ј мӢңк°Ғ
            const leaveCell = document.createElement('td');
            leaveCell.className = 'time-cell';
            if (record.leaveAt) {
                const leaveTime = new Date(record.leaveAt);
                leaveCell.textContent = formatTime(leaveTime);
            } else {
                leaveCell.textContent = 'лҜёкё°лЎқ';
                leaveCell.classList.add('missing');
                tr.classList.add('row-warning');
            }
            tr.appendChild(leaveCell);

            // к·јл¬ҙ мӢңк°„
            const workTimeCell = document.createElement('td');
            if (record.commuteAt && record.leaveAt) {
                const workTime = calculateWorkTime(record.commuteAt, record.leaveAt);
                workTimeCell.textContent = workTime;
            } else {
                workTimeCell.textContent = 'кі„мӮ°л¶Ҳк°Җ';
                workTimeCell.style.color = '#999';
            }
            tr.appendChild(workTimeCell);

            // мҲҳм • лІ„нҠј
            const actionCell = document.createElement('td');
            const statusBadge = document.createElement('span');
            statusBadge.className = 'status-cell';
            if (record.isCorrected) {
                statusBadge.textContent = 'м •м • мҷ„лЈҢ';
                statusBadge.classList.add('completed');
            } else {
                statusBadge.textContent = 'мҡ”мІӯ';
                statusBadge.classList.add('request');
                statusBadge.style.cursor = 'pointer';
                statusBadge.addEventListener('click', () => requestCorrection(record.id));
            }
            actionCell.appendChild(statusBadge);
            tr.appendChild(actionCell);

            // мғҒнғңм—җ л”°лҘё н–ү мҠӨнғҖмқј
            if (record.status === 'ABSENT') {
                tr.classList.add('row-error');
            }

            return tr;
        }

        // лӮ м§ң нҸ¬л§·нҢ…
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['мқј', 'мӣ”', 'нҷ”', 'мҲҳ', 'лӘ©', 'кёҲ', 'нҶ '];
            const weekday = weekdays[date.getDay()];
            return `${month}мӣ” ${String(day).padStart(2, '0')}мқј (${weekday})`;
        }

        // мӢңк°„ нҸ¬л§·нҢ…
        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // к·јл¬ҙ мӢңк°„ кі„мӮ°
        function calculateWorkTime(commuteAt, leaveAt) {
            const start = new Date(commuteAt);
            const end = new Date(leaveAt);
            const diffMs = end - start;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            return `${diffHours}h ${String(diffMinutes).padStart(2, '0')}m`;
        }

        // нҺҳмқҙм§Җл„Өмқҙм…ҳ м—…лҚ°мқҙнҠё
        function updatePagination(totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            // мқҙм „ лІ„нҠј
            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'вҖ№';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadAttendanceData();
                }
            });
            pagination.appendChild(prevBtn);

            // нҺҳмқҙм§Җ лІҲнҳё
            const pageNumbers = document.createElement('div');
            pageNumbers.className = 'page-numbers';
            
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.textContent = '1';
                firstBtn.addEventListener('click', () => {
                    currentPage = 1;
                    loadAttendanceData();
                });
                pageNumbers.appendChild(firstBtn);
                
                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px';
                    pageNumbers.appendChild(ellipsis);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                if (i === currentPage) {
                    pageBtn.classList.add('active');
                }
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    loadAttendanceData();
                });
                pageNumbers.appendChild(pageBtn);
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px';
                    pageNumbers.appendChild(ellipsis);
                }
                
                const lastBtn = document.createElement('button');
                lastBtn.textContent = totalPages;
                lastBtn.addEventListener('click', () => {
                    currentPage = totalPages;
                    loadAttendanceData();
                });
                pageNumbers.appendChild(lastBtn);
            }

            pagination.appendChild(pageNumbers);

            // лӢӨмқҢ лІ„нҠј
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'вҖә';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    loadAttendanceData();
                }
            });
            pagination.appendChild(nextBtn);
        }

        // м •м • мҡ”мІӯ
        function requestCorrection(attendanceId) {
            if (confirm('к·јнғң м •м •мқ„ мҡ”мІӯн•ҳмӢңкІ мҠөлӢҲк№Ң?')) {
                // TODO: м •м • мҡ”мІӯ API нҳём¶ң
                alert('м •м • мҡ”мІӯмқҙ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ.');
                loadAttendanceData();
            }
        }

        // мғҳн”Ң лҚ°мқҙн„° н‘ңмӢң (APIк°Җ м—Ҷмқ„ кІҪмҡ°)
        function displaySampleData() {
            const sampleRecords = [
                { workDate: '2025-12-01', commuteAt: '2025-12-01T08:58:00', leaveAt: '2025-12-01T18:05:00', status: 'ON_TIME', isCorrected: false },
                { workDate: '2025-12-02', commuteAt: '2025-12-02T09:15:00', leaveAt: '2025-12-02T18:02:00', status: 'LATE', isCorrected: false },
                { workDate: '2025-12-03', commuteAt: null, leaveAt: null, status: 'ABSENT', isCorrected: false },
                { workDate: '2025-12-04', commuteAt: '2025-12-04T08:59:00', leaveAt: null, status: 'ON_TIME', isCorrected: false },
                { workDate: '2025-12-05', commuteAt: '2025-12-05T09:00:00', leaveAt: '2025-12-05T20:30:00', status: 'ON_TIME', isCorrected: true },
            ];

            updateTable(sampleRecords.map(r => ({ ...r, id: Math.random() })));
            updatePagination(2);
        }
    </script>
</div>
