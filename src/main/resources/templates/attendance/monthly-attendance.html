<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/attendance/user-attendance-sidebar :: menu},
          ~{::pageCss},
          ~{::pageScript}
      )}">
<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/board.css}">
        <link rel="stylesheet" th:href="@{/css/attendance/monthly-attendance.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </th:block>
</head>
<body>
<div th:fragment="content">
    <div class="board-container">
        <!-- 게시판 제목 -->
        <div class="board-header">
            <h1>월별 근태 현황 조회</h1>
        </div>

        <!-- 검색 및 필터 -->
        <div class="board-search-section">
            <div class="search-filters">
                <select id="searchType" class="filter-select">
                    <option value="MONTH">월별 선택</option>
                    <option value="RANGE">기간 설정</option>
                </select>

                <div id="monthPickerWrapper" class="input-area">
                    <div class="custom-dropdown" id="monthDropdown">
                        <div class="dropdown-selected">
                            <span id="selectedMonthText">연도 선택</span>
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <ul class="dropdown-list" id="monthList"></ul>
                    </div>
                </div>

                <div id="rangePickerWrapper" class="input-area range-inputs" style="display: none;">
                    <input type="date" id="startDate" class="date-input">
                    <input type="date" id="endDate" class="date-input">
                </div>

                <select id="statusFilter" class="filter-select">
                    <option value="ALL">전체 목록</option>
                    <option value="ON_TIME">정상출근</option>
                    <option value="LATE">지각</option>
                    <option value="ABSENT">결근</option>
                    <option value="VACATION">휴가</option>
                </select>

                <button type="button" class="btn-search" id="rangeSearchBtn">
                    <i class="fas fa-search"></i> 검색
                </button>
            </div>
        </div>
        <input type="hidden" id="monthSelect" value="">

        <!-- 요약 카드 -->
        <div class="card summary-card" style="margin-bottom: 24px;">
            <div class="summary-grid">
                <div class="summary-item">
                    <span class="summary-label">총 근무 시간 (누적)</span>
                    <div class="summary-value"><span id="totalWorkHours" class="val-blue">0h 00m</span></div>
                </div>
                <div class="summary-item">
                    <span class="summary-label">지각 횟수</span>
                    <div class="summary-value"><span id="lateCount" class="val-orange">0</span> <small>회</small></div>
                </div>
                <div class="summary-item">
                    <span class="summary-label">휴가/결근 일수</span>
                    <div class="summary-value"><span id="absentCount" class="val-red">0</span> <small>일</small></div>
                </div>
            </div>
        </div>

        <!-- 게시글 목록 테이블 -->
        <div class="board-table-container">
            <table class="board-table" id="attendanceTable">
                <thead>
                <tr>
                    <th>날짜</th>
                    <th>출근 시각</th>
                    <th>퇴근 시각</th>
                    <th>근무 시간</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="board-bottom-actions">
            <div class="pagination" id="boardPagination">
                <!-- 동적으로 생성됨 -->
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="pageScript">
    <script th:src="@{/js/attendance/monthly-attendance.js}"></script>
</th:block>
</body>
</html>
