<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{layout/layout :: layout(
          ~{::content},
          ~{sidebar/attendance-sidebar :: menu}
      )}">
<head>
    <title>출퇴근 기록 - 엠터캠피스</title>
</head>
<body>

<div th:fragment="content">
    <h1 class="content-title">출퇴근 기록</h1>

    <div class="work-summary-box">
        <div class="work-summary-header">
            <div class="work-summary-times">
                <span class="label">현재 시각</span>
                <div class="work-clock" id="current-time">00:00:00</div>
            </div>
            <div class="work-summary-times">
                <span class="label">기준 근무 시간</span>
                <div class="work-time-range" th:text="${baseWorkTime} ?: '09:00 ~ 18:00'">09:00 ~ 18:00</div>
            </div>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn-checkin" onclick="handleCheckIn()">
                <i class="fas fa-sign-in-alt"></i> 출근 (Check-in)
            </button>
            <button type="button" class="btn-checkout" onclick="handleCheckOut()">
                <i class="fas fa-sign-out-alt"></i> 퇴근 (Check-out)
            </button>
        </div>
    </div>

    <div class="record-container">
        <p class="record-title">오늘의 기록</p>
        <div class="record-details">
            <div class="record-item">
                <span class="record-item-label">출근 시각:</span>
                <span th:text="${checkInTime} ?: '미기록'">-</span>
            </div>
            <div class="record-item">
                <span class="record-item-label">퇴근 시각:</span>
                <span th:text="${checkOutTime} ?: '미기록'">-</span>
            </div>
            <div class="record-item">
                <span class="record-item-label">근무 상태:</span>
                <span class="status-badge"
                      th:classappend="${checkInTime != null && checkOutTime == null} ? 'status-ing' : ''"
                      th:text="${workStatus} ?: '업무 전'">상태 미정</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <span th:text="'© 2025 ' + (${companyName} ?: 'OrbitFlow') + '. All rights reserved.'">
            © 2025 OrbitFlow. All rights reserved.
        </span>
    </div>

    <script th:inline="javascript">
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-GB', {
                hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const clockEl = document.getElementById('current-time');
            if (clockEl) clockEl.textContent = timeString;
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
        });

        function handleCheckIn() {
            if(confirm("출근을 기록하시겠습니까?")) {
                // API 호출 로직 (생략)
                alert("출근 기록 완료");
            }
        }

        function handleCheckOut() {
            if(confirm("퇴근을 기록하시겠습니까?")) {
                // API 호출 로직 (생략)
                alert("퇴근 기록 완료");
            }
        }
    </script>
</div>
</body>
</html>
