<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/attendance/user-attendance-sidebar :: menu},
          ~{::pageCss},
          ~{::pageScript}
      )}">
<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/history.css}">
    </th:block>
</head>
<body>
<div th:fragment="content" class="history-container">
    <h1 class="page-title">월별 근태 조회</h1>

    <div class="search-section">
        <label>조회 월:</label>
        <div class="custom-dropdown" id="monthDropdown">
            <div class="dropdown-selected">
                <span id="selectedMonthText">연도 선택</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <ul class="dropdown-list" id="monthList">
            </ul>
        </div>
        <input type="hidden" id="monthSelect" value="">
    </div>

    <div class="summary-container">
        <h2 class="section-title">월별 근무 요약</h2>
        <div class="summary-cards">
            <div class="card">
                <span class="card-label">총 근무 시간 (누적)</span>
                <div class="card-value-group">
                    <span id="totalWorkHours" class="value-blue">0</span>
                    <span class="unit">시간</span>
                </div>
            </div>
            <div class="card">
                <span class="card-label">지각 횟수</span>
                <div class="card-value-group">
                    <span id="lateCount" class="value-orange">0</span>
                    <span class="unit">회</span>
                </div>
            </div>
            <div class="card">
                <span class="card-label">휴가/결근 일수</span>
                <div class="card-value-group">
                    <span id="absentCount" class="value-red">0</span>
                    <span class="unit">일</span>
                </div>
            </div>
        </div>
    </div>

    <div class="detail-container">
        <div class="detail-header">
            <h2 class="section-title">일별 상세 기록</h2>
            <select class="form-select-sm status-filter" id="statusFilter">
                <option value="ALL">전체 ▼</option>
                <option value="ON_TIME">정상출근</option>
                <option value="LATE">지각</option>
                <option value="ABSENT">결근</option>
                <option value="BEFORE_WORK">휴가</option>
            </select>
        </div>
        <table class="history-table" id="attendanceTable">
            <thead>
            <tr>
                <th>날짜</th>
                <th>출근 시각</th>
                <th>퇴근 시각</th>
                <th>근무 시간</th>
                <th>상태</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td colspan="5" style="text-align:center; padding: 50px;">데이터를 불러오는 중입니다...</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination">
    </div>
</div>

<th:block th:fragment="pageScript">
    <script th:src="@{/js/history.js}"></script>
</th:block>
</body>
</html>
