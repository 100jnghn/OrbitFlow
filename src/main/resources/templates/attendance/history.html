<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/attendance/user-attendance-sidebar :: menu},
          ~{::pageCss},
          ~{::pageScript}
      )}">
<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/history.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </th:block>
</head>
<body>
<div th:fragment="content" class="history-container">
    <div class="history-header">
        <h1 class="page-title">월별 근태 조회</h1>
    </div>

    <div class="search-section">
        <div class="filter-group">
            <label for="searchType"><i class="fas fa-filter"></i> 조회 방식</label>
            <select id="searchType" class="modern-select">
                <option value="MONTH">월별 선택</option>
                <option value="RANGE">기간 설정</option>
            </select>
        </div>

        <div class="v-divider"></div>

        <div class="input-area">
            <div id="monthPickerWrapper" class="picker-wrapper">
                <div class="custom-dropdown" id="monthDropdown">
                    <div class="dropdown-selected">
                        <span id="selectedMonthText">연도 선택</span>
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                    <ul class="dropdown-list" id="monthList"></ul>
                </div>
            </div>

            <div id="rangePickerWrapper" class="picker-wrapper" style="display: none;">
                <div class="date-input-group">
                    <div class="date-field">
                        <i class="far fa-calendar-alt"></i>
                        <input type="date" id="startDate" class="modern-date-input">
                    </div>
                    <span class="range-sep">~</span>
                    <div class="date-field">
                        <i class="far fa-calendar-alt"></i>
                        <input type="date" id="endDate" class="modern-date-input">
                    </div>
                </div>
                <button id="rangeSearchBtn" class="modern-btn-search">
                    <i class="fas fa-search"></i> 조회
                </button>
            </div>
        </div>
        <input type="hidden" id="monthSelect" value="">
    </div>

    <div class="card-section summary-card">
        <h2 class="card-title">월별 근무 요약</h2>
        <div class="summary-grid">
            <div class="summary-item">
                <p class="summary-label">총 근무 시간 (누적)</p>
                <p class="summary-value"><span id="totalWorkHours" class="val-blue">0</span> <span class="unit">시간</span></p>
            </div>
            <div class="summary-item">
                <p class="summary-label">지각 횟수</p>
                <p class="summary-value"><span id="lateCount" class="val-orange">0</span> <span class="unit">회</span></p>
            </div>
            <div class="summary-item">
                <p class="summary-label">휴가/결근 일수</p>
                <p class="summary-value"><span id="absentCount" class="val-red">0</span> <span class="unit">일</span></p>
            </div>
        </div>
    </div>

    <div class="card-section detail-card">
        <div class="card-header-flex">
            <h2 class="card-title">일별 상세 기록</h2>


            <select class="modern-select" id="statusFilter">
                <option value="ALL">전체 목록</option>
                <option value="ON_TIME">정상출근</option>
                <option value="ABSENT">결근</option>
                <option value="LATE">지각</option>
                <option value="VACATION">휴가</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table class="history-table" id="attendanceTable">
                <thead>
                <tr>
                    <th>날짜</th>
                    <th>출근 시각</th>
                    <th>퇴근 시각</th>
                    <th>근무 시간</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<th:block th:fragment="pageScript">
    <script th:src="@{/js/history.js}"></script>
</th:block>
</body>
</html>
