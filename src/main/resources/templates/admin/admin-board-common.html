<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title>공용 게시판 관리</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
        <link rel="stylesheet" th:href="@{/css/admin-board.css}">
    </th:block>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-board-common.js}"></script>
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="board-admin-container">
        <!-- 게시판 관리 섹션 -->
        <div class="admin-section">
            <div class="section-header">
                <h2 class="section-title">게시판 관리</h2>
                <button class="btn-add" onclick="openAddBoardModal()">
                    <i class="fas fa-plus"></i>추가
                </button>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>게시판 이름</th>
                            <th>생성일</th>
                            <th>수정/삭제</th>
                        </tr>
                    </thead>
                    <tbody id="boardTableBody">
                        <!-- 데이터는 JavaScript로 동적 생성 -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="boardPagination">
                <!-- 페이지네이션은 JavaScript로 동적 생성 -->
            </div>
        </div>
    </div>

    <!-- 게시판 추가/수정 모달 -->
    <div id="boardModal" class="modal">
        <div class="modal-content board-modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">게시판 추가</h3>
                <span class="close" onclick="closeBoardModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="boardForm">
                    <input type="hidden" id="boardId" name="id">
                    
                    <!-- 1. 제목 -->
                    <div class="form-group">
                        <label for="boardName" class="form-label">제목</label>
                        <input type="text" id="boardName" name="boardName" required 
                               placeholder="게시판 이름을 입력하세요" class="form-input">
                    </div>

                    <!-- 2. 게시판 권한 -->
                    <div class="form-group">
                        <label class="form-label">게시판 권한</label>
                        <div class="permission-section">
                            <div class="permission-search">
                                <input type="text" id="employeeSearchInput" 
                                       placeholder="사원 이름 또는 사번으로 검색" 
                                       class="form-input">
                                <button type="button" class="btn-search" onclick="searchEmployee()">
                                    <i class="fas fa-search"></i>검색
                                </button>
                            </div>
                            <div id="employeeSearchResults" class="employee-search-results"></div>
                            <div id="selectedEmployees" class="selected-employees">
                                <!-- 선택된 사원들이 여기에 표시됨 -->
                            </div>
                        </div>
                    </div>

                    <!-- 3. 게시판 기능 -->
                    <div class="form-group">
                        <label class="form-label">게시판 기능</label>
                        <div class="board-features">
                            <label class="feature-option">
                                <input type="radio" name="commentActivated" value="true" checked>
                                <span>댓글 허용</span>
                            </label>
                            <label class="feature-option">
                                <input type="radio" name="commentActivated" value="false">
                                <span>댓글 차단</span>
                            </label>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeBoardModal()">취소</button>
                        <button type="submit" class="btn-submit" id="submitBtn">생성</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content delete-modal-content">
            <div class="modal-header">
                <h3>삭제하시겠습니까?</h3>
                <span class="close" onclick="closeDeleteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p class="delete-message">이 작업은 되돌릴 수 없습니다. 계속 진행하시겠습니까?</p>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeDeleteModal()">취소</button>
                    <button type="button" class="btn-delete-confirm" onclick="confirmDelete()">확인</button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
