<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title>부서 게시판 활성화</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
        <link rel="stylesheet" th:href="@{/css/admin-board/admin-board.css}">
    </th:block>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-board/admin-board-dept.js}"></script>
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="board-admin-container">
        <!-- 부서 게시판 활성화 섹션 -->
        <div class="admin-section">
            <div class="section-header">
                <h2 class="section-title">부서 게시판 활성화</h2>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>부서명</th>
                            <th>활성화/비활성화</th>
                        </tr>
                    </thead>
                    <tbody id="organizationTableBody">
                        <!-- 데이터는 JavaScript로 동적 생성 -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="organizationPagination">
                <!-- 페이지네이션은 JavaScript로 동적 생성 -->
            </div>
        </div>
    </div>
</div>

</body>
</html>
