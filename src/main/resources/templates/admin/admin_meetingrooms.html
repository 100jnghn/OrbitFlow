<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: '관리자 - 회의실 관리'">관리자 - 회의실 관리</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
    <link rel="stylesheet" th:href="@{/css/admin-meetingroom.css}">
</head>
<body>

<div th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{::admin-sidebar-menu}
)}"></div>

<div th:fragment="content">
    <div class="page-header">
        <h1 class="page-title">회의실 관리</h1>
        <button type="button" class="btn-add">
            <i class="fas fa-plus"></i>
            회의실 추가
        </button>
    </div>

    <div class="table-container">
        <table class="resource-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>회의실명</th>
                <th>위치</th>
                <th>비고</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script th:src="@{/js/meetingroom.js}"></script>
</div>

<ul th:fragment="admin-sidebar-menu" class="sidebar-menu">
    <li class="selected">
        <a th:href="@{/view/admin/resource/meetingrooms}" class="sidebar-link">
            회의실 관리
        </a>
    </li>
</ul>

</body>
</html>
