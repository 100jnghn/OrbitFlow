<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/admin-sidebar :: menu},
          ~{::pageCss},
          ~{::pageScript}
      )}">
<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-attendance/dashboard.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </th:block>
</head>

<body>
<div th:fragment="content">
    <div class="board-admin-container">
        <div class="board-header"><h1>직원 근태 종합 현황 대시보드</h1></div>

        <div class="summary-section">
            <h2 class="section-title" id="todayLabel">금일 요약 현황</h2>
            <div class="summary-cards">
                <div class="summary-card card-green">
                    <span class="card-label">출근 완료</span>
                    <div class="card-value">
                        <span id="onTimeCount">0</span> <small>/ <span id="totalEmployees">0</span></small>
                    </div>
                </div>
                <div class="summary-card card-orange">
                    <span class="card-label">금일 지각</span>
                    <div class="card-value"><span id="lateCount">0</span> <small>명</small></div>
                </div>
                <div class="summary-card card-red">
                    <span class="card-label">근무중</span>
                    <div class="card-value"><span id="notLeavingCount">0</span> <small>명</small></div>
                </div>
            </div>
        </div>

        <div class="board-search-section">
            <div class="search-filters">
                <div class="date-field-wrapper">
                    <label class="filter-label">시작일</label>
                    <input type="date" id="startDate" class="date-input">
                </div>

                <div class="date-field-wrapper">
                    <label class="filter-label">종료일</label>
                    <input type="date" id="endDate" class="date-input">
                </div>

                <div class="filter-select-wrapper">
                    <label class="filter-label">상태</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="ALL">전체</option>
                        <option value="ON_TIME">정상</option>
                        <option value="LATE">지각</option>
                        <option value="ABSENT">결근</option>
                        <option value="BEFORE_WORK">출근전</option>
                    </select>
                </div>

                <div class="search-input-wrapper">
                    <label class="filter-label">검색</label>
                    <input type="text" id="searchKeyword" class="search-input" placeholder="이름/사번">
                </div>

                <button type="button" class="btn-search" onclick="handleSearch()">검색</button>
                <button type="button" class="btn-reset" onclick="resetFilters()">초기화</button>
            </div>
        </div>

        <div class="board-table-container">
            <table class="board-table" id="attendanceTable">
                <thead>
                <tr>
                    <th>이름 / 사번</th>
                    <th>출근 시각</th>
                    <th>퇴근 시각</th>
                    <th>총 근무 시간</th>
                    <th>상태</th>
                    <th>날짜</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td colspan="7" style="text-align: center; padding: 40px; color: #9ca3af;">
                        데이터를 불러오는 중입니다...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="board-bottom-actions">
            <div class="pagination" id="boardPagination"></div>
        </div>
    </div>

    <!-- 정정 모달 -->
    <div id="correctionModal" class="modal" onclick="handleModalBackdropClick(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>근태 기록 정정</h3>
                <button class="close" type="button" onclick="closeModal()">×</button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="targetAttendanceId">

                <div class="form-group">
                    <label>변경할 상태</label>
                    <select id="modalStatus" class="form-select">
                        <option value="ON_TIME">정상</option>
                        <option value="LATE">지각</option>
                        <option value="ABSENT">결근</option>
                        <option value="BEFORE_WORK">출근전</option>
                    </select>
                </div>

                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>정정 사유 *</label>
                        <span id="charCount">0 / 40</span>
                    </div>
                    <textarea id="modalReason" class="form-textarea" maxlength="40" rows="4"
                              placeholder="정정 사유를 입력해주세요 (최대 40자)"></textarea>
                    <span class="error-message" id="modalReasonError"></span>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" type="button" onclick="closeModal()">닫기</button>
                <button class="btn-submit" type="button" onclick="submitCorrection()">저장하기</button>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="pageScript">
    <script th:src="@{/js/admin-attendance/dashboard.js}"></script>
</th:block>
</body>
</html>
