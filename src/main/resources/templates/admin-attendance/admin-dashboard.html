<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout-admin :: layout(
          ~{::content},
          ~{fragments/header :: header},
          ~{sidebar/admin-sidebar :: menu},
          ~{::pageCss},
          ~{::pageScript}
      )}">

<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-attendance/dashboard.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </th:block>
</head>

<body>
    <div th:fragment="content">
        <div class="board-admin-container">
            <div class="board-header">
                <h1 class="page-title">직원 근태 종합 현황</h1>
                <p id="todayLabel" class="header-subtitle">금일 요약 현황 (2026.01.10)</p>
            </div>

            <div class="summary-section">
                <div class="summary-cards">
                    <div class="summary-card">
                        <span class="card-label">전체 직원</span>
                        <div class="card-value"><span id="totalEmployees">0</span> <small>명</small></div>
                    </div>
                    <div class="summary-card">
                        <span class="card-label">출근 완료</span>
                        <div class="card-value text-green"><span id="onTimeCount">0</span> <small>명</small></div>
                    </div>
                    <div class="summary-card">
                        <span class="card-label">금일 지각</span>
                        <div class="card-value text-yellow"><span id="lateCount">0</span> <small>명</small></div>
                    </div>
                    <div class="summary-card">
                        <span class="card-label">결근 / 미출근</span>
                        <div class="card-value text-red"><span id="absentCount">0</span> <small>명</small></div>
                    </div>
                </div>

                <div class="etc-summary-bar">
                    <span class="etc-label">기타 현황:</span>
                    <div class="etc-item">휴가 <strong id="vacationCount">0</strong></div>
                    <div class="etc-item">외근 <strong id="outsideCount">0</strong></div>
                    <div class="etc-item">출장 <strong id="businessTripCount">0</strong></div>
                </div>
            </div>

            <div class="board-search-section">
                <div class="search-filters">
                    <div class="filter-group">
                        <label class="filter-label">기간 설정</label>
                        <div class="date-range">
                            <input type="date" id="startDate" class="date-input">
                            <span class="date-separator">~</span>
                            <input type="date" id="endDate" class="date-input">
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">상태 필터링</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="ALL">전체 상태</option>
                            <option value="ON_TIME">정상</option>
                            <option value="LATE">지각</option>
                            <option value="ABSENT">결근</option>
                            <option value="BEFORE_WORK">근무예정</option>
                            <option value="VACATION">휴가</option>
                            <option value="OUTSIDE">외근</option>
                            <option value="BUSINESS_TRIP">출장</option>
                        </select>
                    </div>
                    <div class="filter-group flex-grow">
                        <label class="filter-label">직원 검색</label>
                        <input type="text" id="searchKeyword" class="search-input" placeholder="이름 또는 사번 입력">
                    </div>
                    <div class="search-buttons">
                        <button type="button" class="btn-search" onclick="handleSearch()">조회</button>
                        <button type="button" class="btn-reset" onclick="resetFilters()">초기화</button>
                    </div>
                </div>
            </div>

            <div class="board-table-container">
                <table class="board-table" id="attendanceTable">
                    <thead>
                        <tr>
                            <th>직원 정보</th>
                            <th>출근 시각</th>
                            <th>퇴근 시각</th>
                            <th>총 근무 시간</th>
                            <th>상태</th>
                            <th>날짜</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="loading-state">데이터를 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="board-bottom-actions">
                <div id="boardPagination"></div>
            </div>
        </div>

        <div id="correctionModal" class="modal" onclick="handleModalBackdropClick(event)">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>근태 기록 정정</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="targetAttendanceId">

                    <div class="form-group">
                        <label class="form-label">변경할 근태 상태</label>
                        <div class="input-wrapper">
                            <select id="modalStatus" class="form-select">
                                <option value="ON_TIME">정상</option>
                                <option value="ABSENT">결근</option>
                                <option value="VACATION">휴가</option>
                                <option value="OUTSIDE">외근</option>
                                <option value="BUSINESS_TRIP">출장</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label class="form-label">정정 사유 <span class="required">*</span></label>
                            <span id="charCount" class="char-count">0 / 40</span>
                        </div>
                        <textarea id="modalReason" class="form-textarea" maxlength="40" rows="4"
                            placeholder="정정 사유를 상세히 입력해주세요 (최대 40자)"></textarea>
                        <div id="modalReasonError" class="error-message" style="display:none;"></div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-cancel" type="button" onclick="closeModal()">취소</button>
                    <button class="btn-submit" type="button" onclick="submitCorrection()">변경사항 저장</button>
                </div>
            </div>
        </div>
    </div>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-attendance/dashboard.js}"></script>
    </th:block>
</body>

</html>
