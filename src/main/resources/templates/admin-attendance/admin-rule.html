<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: '관리자 - 근태 규칙 관리'">관리자 - 근태 규칙 관리</title>

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-board/admin-board.css}">
        <link rel="stylesheet" th:href="@{/css/admin-attendance/admin-rule.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="board-admin-container">
        <!-- 게시판 제목 -->
        <div class="board-header">
            <h1>근태 규칙 및 근무 시간 관리</h1>
        </div>

        <!-- 기본 규칙 섹션 -->
        <section class="rule-section">
            <div class="card rule-form-card">
                <h2 class="section-title">회사 전체 기본 규칙</h2>
                <div class="rule-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">기본 출퇴근 시간</label>
                            <div class="time-input-group">
                                <input type="time" id="defaultStartTime" value="08:00" class="time-input">
                                <span class="time-separator">~</span>
                                <input type="time" id="defaultEndTime" value="17:00" class="time-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">지각 허용 기준</label>
                            <div class="judgment-input">
                                <input type="number" id="tardinessMinutes" value="10" min="0" class="number-input">
                                <span class="input-suffix">분</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="saveDefaultRuleBtn" class="btn-primary">
                            <i class="fas fa-save"></i> 저장
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 예외 규칙 섹션 -->
        <section class="rule-section">
            <div class="section-header">
                <h2 class="section-title">사원별 예외 규칙 관리</h2>
                <button type="button" id="addExceptionRuleBtn" class="btn-primary">
                    <i class="fas fa-plus"></i> 예외 규칙 추가
                </button>
            </div>
            <div class="board-table-container">
                <table class="board-table" id="exceptionTable">
                    <thead>
                    <tr>
                        <th>대상 사원</th>
                        <th>적용 기간</th>
                        <th>출근 시간</th>
                        <th>퇴근 시간</th>
                        <th>휴게 시간</th>
                        <th>사유</th>
                        <th>등록일</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="exceptionRulesTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- 예외 규칙 추가 모달 -->
    <div id="exceptionRuleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">사원별 근태 예외 규칙 추가</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="exceptionRuleForm">
                    <input type="hidden" id="ruleId" name="ruleId">
                    <input type="hidden" id="selectedEmployeeId" name="employeeId">
                    
                    <!-- 1. 대상 사원 선택 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">대상 사원 선택</label>
                            <div class="employee-search-group">
                                <input type="text" id="employeeSearchInput" class="form-control employee-search-input" 
                                       placeholder="예, 홍길동 또는 1001">
                                <button type="button" id="employeeSearchBtn" class="btn-search">검색</button>
                            </div>
                            <div id="employeeSearchResults" class="employee-search-results"></div>
                            <div id="selectedEmployeeInfo" class="selected-employee-info" style="display: none;"></div>
                            <span class="error-message" id="employeeError"></span>
                        </div>
                    </div>

                    <!-- 2. 규칙 적용 기간 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">규칙 적용 기간</label>
                            <div class="date-input-group">
                                <div class="date-field">
                                    <label>적용 시작일</label>
                                    <input type="date" id="validFrom" name="validFrom" class="date-input" required>
                                    <span class="error-message" id="validFromError"></span>
                                </div>
                                <div class="date-field">
                                    <label>종료일 (NULL)</label>
                                    <input type="date" id="validTo" name="validTo" class="date-input">
                                    <span class="error-message" id="validToError"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 규칙 적용 시간 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">규칙 적용 시간</label>
                            <div class="override-fields">
                                <div class="override-row">
                                    <div class="override-field">
                                        <label>출근 시간</label>
                                        <input type="time" id="exceptionStartTime" name="startTime" class="time-input">
                                        <span class="error-message" id="startTimeError"></span>
                                    </div>
                                    <div class="override-field">
                                        <label>퇴근 시간</label>
                                        <input type="time" id="exceptionEndTime" name="endTime" class="time-input">
                                        <span class="error-message" id="endTimeError"></span>
                                    </div>
                                </div>
                                <div class="override-row">
                                    <div class="override-field">
                                        <label>휴게 시간 (분)</label>
                                        <input type="text" id="exceptionBreakMinutes" name="breakMinutes" 
                                               class="number-input" pattern="[0-9]*" inputmode="numeric"
                                               placeholder="숫자만 입력" maxlength="3">
                                        <span class="error-message" id="breakMinutesError"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="error-message" id="overrideFieldsError" style="margin-top: 8px;"></div>
                        </div>
                    </div>

                    <!-- 4. 규칙 적용 사유 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">규칙 적용 사유 <span style="color: var(--danger-color);">*</span></label>
                            <textarea id="reason" name="reason" class="form-control reason-textarea" 
                                      placeholder="사유를 입력하세요 (예: 단말기 오류, 외근 후 퇴근 등)"
                                      maxlength="40" required></textarea>
                            <div class="char-count-wrapper">
                                <span id="reasonCharCount" class="char-count">0 / 40</span>
                            </div>
                            <span class="error-message" id="reasonError"></span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelBtn">취소</button>
                        <button type="submit" class="btn-primary" id="submitBtn">규칙 적용</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 예외 규칙 수정 모달 -->
    <div id="editExceptionRuleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>사원별 근태 예외 규칙 수정</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editExceptionRuleForm">
                    <input type="hidden" id="editRuleId" name="ruleId">
                    
                    <!-- 대상 사원 정보 (읽기 전용) -->
                    <div class="form-section">
                        <div class="section-content">
                            <div class="employee-info-display">
                                <div class="info-field">
                                    <label>대상 사원:</label>
                                    <span id="editEmployeeInfo"></span>
                                </div>
                                <div class="info-field">
                                    <label>적용 종료일:</label>
                                    <span id="editOriginalValidTo"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 규칙 적용 기간 수정 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">규칙 적용 기간 수정</label>
                            <div class="date-input-group">
                                <div class="date-field">
                                    <label>적용 시작일:</label>
                                    <input type="date" id="editValidFrom" name="validFrom" class="date-input" readonly>
                                </div>
                                <div class="date-field">
                                    <label>적용 종료일 (수정 가능):</label>
                                    <input type="date" id="editValidTo" name="validTo" class="date-input">
                                    <span class="error-message" id="editValidToError"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 규칙 적용 시간 수정 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">규칙 적용 시간 수정</label>
                            <div class="override-fields">
                                <div class="override-row">
                                    <div class="override-field">
                                        <label>출근 시간:</label>
                                        <input type="time" id="editExceptionStartTime" name="startTime" class="time-input">
                                        <span class="error-message" id="editStartTimeError"></span>
                                    </div>
                                    <div class="override-field">
                                        <label>퇴근 시간:</label>
                                        <input type="time" id="editExceptionEndTime" name="endTime" class="time-input">
                                        <span class="error-message" id="editEndTimeError"></span>
                                    </div>
                                </div>
                                <div class="override-row">
                                    <div class="override-field">
                                        <label>휴게 시간:</label>
                                        <input type="text" id="editExceptionBreakMinutes" name="breakMinutes" 
                                               class="number-input" pattern="[0-9]*" inputmode="numeric"
                                               placeholder="숫자만 입력" maxlength="3">
                                        <span class="error-message" id="editBreakMinutesError"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 규칙 수정 사유 -->
                    <div class="form-section">
                        <div class="section-content">
                            <label class="section-label">규칙 수정 사유 <span style="color: var(--danger-color);">*</span></label>
                            <textarea id="editReason" name="reason" class="form-control reason-textarea" 
                                      placeholder="사유를 입력하세요 (예: 단말기 오류, 외근 후 퇴근 등)"
                                      maxlength="40" required></textarea>
                            <div class="char-count-wrapper">
                                <span id="editReasonCharCount" class="char-count">0 / 40</span>
                            </div>
                            <span class="error-message" id="editReasonError"></span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="editCancelBtn">취소</button>
                        <button type="submit" class="btn-primary" id="editSubmitBtn">규칙 수정</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="pageScript">
    <script th:src="@{/js/admin-attendance/rule.js}"></script>
</th:block>

<!-- 사이드바 -->
<ul th:fragment="admin-sidebar-menu" class="sidebar-menu">
    <li class="selected">
        <a th:href="@{/view/admin/attendance-rules}" class="sidebar-link">
            근태 규칙 관리
        </a>
    </li>
</ul>
