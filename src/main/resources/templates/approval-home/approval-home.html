<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>결재 양식 관리</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/approval-home/approval-home.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/css/approval-home/approval-home.js}" defer></script>
    </th:block>
</head>

<body>

<div th:fragment="content">
    <div class="approval-home-container">
        <!-- 상단 UI -->
        <section class="approval-header-row">
            <div class="header-left">
                <button type="button" class="primary-btn" id="createTemplateBtn">
                    결재 양식 생성
                </button>
                <button type="button" class="secondary-btn" id="updateTemplateBtn">
                    결재 양식 업데이트
                </button>
            </div>

            <div class="header-right">
                <!-- 상태 필터 -->
                <select id="statusFilter" class="status-filter-select">
                    <option value="">상태 필터</option>
                    <option value="DRAFT">임시 저장</option>
                    <option value="ACTIVE">활성</option>
                    <option value="INACTIVE">비활성</option>
                </select>

                <!-- 카테고리 필터 -->
                <select id="categoryFilter" class="status-filter-select">
                    <option value="">카테고리 필터</option>
                    <option value="GENERAL">일반</option>
                    <option value="SCHEDULE">일정</option>
                    <option value="ATTENDANCE">근태</option>
                </select>

                <!-- 검색 -->
                <div class="search-group">
                    <input
                            type="text"
                            id="keywordInput"
                            class="search-input"
                            placeholder="양식명으로 검색"
                    />
                    <div class="hint"></div>
                </div>

                <button type="button" id="searchBtn" class="search-btn">
                    검색
                </button>
            </div>
        </section>


        <!-- =====================
             생성 팝업
        ====================== -->
        <div id="createPopup" class="modal-backdrop" style="display:none;">
            <div class="modal-content">
                <div class="modal-title">새 문서 양식 생성</div>

                <!-- 문서 양식 이름 -->
                <div class="modal-form-group">
                    <label for="popupTemplateName">문서 양식 이름</label>
                    <input type="text" id="popupTemplateName" class="modal-input"/>
                    <div class="hint"></div>
                </div>

                <!-- 문서 양식 설명 -->
                <div class="modal-form-group">
                    <label for="popupTemplateDesc">문서 양식 설명</label>
                    <textarea
                            id="popupTemplateDesc"
                            class="modal-textarea"
                            rows="3"
                    ></textarea>
                    <div class="hint"></div>
                </div>

                <!-- 🔥 카테고리 (필수) -->
                <div class="modal-form-group">
                    <label for="popupCategory">카테고리</label>
                    <select id="popupCategory" class="modal-select">
                        <option value="">선택하세요</option>
                        <option value="GENERAL">일반</option>
                        <option value="SCHEDULE">일정</option>
                        <option value="ATTENDANCE">근태</option>
                    </select>
                    <div class="hint"></div>
                </div>

                <!-- 일정 유형 (카테고리 = SCHEDULE) -->
                <div class="modal-form-group">
                    <label for="popupBaseRole">일정 유형</label>
                    <select id="popupBaseRole" class="modal-select" disabled>
                        <option value="">선택하세요</option>
                        <option value="VACATION">휴가</option>
                        <option value="BUSINESS_TRIP">출장</option>
                        <option value="OUTWORK">외근</option>
                        <option value="COMPANY_EVENT">회사 일정</option>
                    </select>
                    <div class="hint"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="modal-cancel-btn" id="popupCancelBtn">취소</button>
                    <button type="button" class="modal-create-btn" id="popupCreateBtn">작성</button>
                </div>
            </div>
        </div>

        <!-- =====================
             업데이트 팝업
        ====================== -->
        <div id="updatePopup" class="modal-backdrop" style="display:none;">
            <div class="modal-content">
                <!-- 헤더 : 제목 + 그룹 활성 토글 -->
                <div class="modal-title-row">
                    <div class="modal-title">문서 양식 업데이트</div>

                    <!-- 그룹 활성/비활성 토글 (수정 모드에서만 활성화) -->
                    <div class="toggle-row">
                        <span class="toggle-label">양식 그룹 활성</span>

                        <label class="switch">
                            <input type="checkbox" id="groupStatusToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <!-- 검색 -->
                <div class="modal-form-group">
                    <label for="updateTemplateSearch">검색할 양식 이름</label>
                    <input
                            type="text"
                            id="updateTemplateSearch"
                            class="modal-input"
                    />
                    <div class="hint" id="updateTemplateSearchHint"></div>
                    <div id="updateDropdown" class="modal-dropdown-list"></div>
                </div>
                <!-- 양식 설명 (기존 class 유지 + editable 전환용) -->
                <div class="modal-form-group">
                    <label>양식 설명</label>
                    <div class="update-descbox">
                        <div
                                class="update-desc-text"
                                id="updateSelectedDescText"
                                contenteditable="false"
                        >
                            선택된 양식의 설명이 표시됩니다.
                        </div>
                    </div>
                </div>
                <!-- 하단 버튼 : 한 줄 -->
                <div class="modal-actions">
                    <button id="popupUpdateCancelBtn" class="update-btn cancel">
                        취소
                    </button>

                    <button id="popupEditBtn" class="update-btn secondary">
                        수정
                    </button>

                    <button id="popupUpdateOkBtn" class="update-btn primary">
                        업데이트
                    </button>
                </div>
            </div>
        </div>


        <!-- 테이블 -->
        <div class="approval-table-wrapper">
            <table class="approval-table">
                <thead>
                <tr>
                    <th>양식명</th>
                    <th>카테고리</th>
                    <th>버전</th>
                    <th>사용 문서 수</th>
                    <th>최종 수정일</th>
                    <th>근태 연동</th>
                    <th>일정 연동</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody id="approvalTableBody"></tbody>
            </table>
            <div id="approvalTableEmpty" class="empty-msg">해당하는 양식이 없습니다.</div>
        </div>

        <!-- 페이지네이션 -->
        <footer class="approval-pagination">
            <button type="button" class="pagination-btn" id="prevPageBtn">이전</button>
            <span id="pageIndicator" class="page-indicator"></span>
            <button type="button" class="pagination-btn" id="nextPageBtn">다음</button>
        </footer>

    </div>
</div>

</body>
</html>
