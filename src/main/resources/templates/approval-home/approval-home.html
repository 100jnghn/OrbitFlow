<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss}
      )}">
<head>
    <meta charset="UTF-8">
    <title>кІ°мһ¬ м–‘мӢқ кҙҖлҰ¬</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/layout-admin.css}">
        <link rel="stylesheet" th:href="@{/css/approval-home/approval-home.css}">
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="approval-home-container">
        <!-- мғҒлӢЁ UI: мўҢмҡ°м •л ¬ -->
        <section class="approval-header-row">
            <div class="header-left">
                <button type="button" class="primary-btn" id="createTemplateBtn">кІ°мһ¬ м–‘мӢқ мғқм„ұ</button>
                <button type="button" class="secondary-btn" id="updateTemplateBtn">кІ°мһ¬ м–‘мӢқ м—…лҚ°мқҙнҠё</button>
            </div>
            <div class="header-right">
                <label for="statusFilter" class="filter-label">мғҒнғң</label>
                <select id="statusFilter" class="status-filter-select">
                    <option value="">м „мІҙ</option>
                    <option value="DRAFT">мһ„мӢң м ҖмһҘ</option>
                    <option value="ACTIVE">нҷңм„ұ</option>
                    <option value="INACTIVE">л№„нҷңм„ұ</option>
                </select>
                <input type="text" id="keywordInput" placeholder="м–‘мӢқлӘ…мңјлЎң кІҖмғү" class="search-input" />
                <button type="button" id="searchBtn" class="search-btn">кІҖмғү</button>
            </div>
        </section>

        <!-- нҢқм—…(лӘЁлӢ¬) : мғҲ л¬ём„ң м–‘мӢқ мғқм„ұ -->
        <div id="createPopup" class="modal-backdrop" style="display:none;">
            <div class="modal-content">
                <div class="modal-title">мғҲ л¬ём„ң м–‘мӢқ мғқм„ұ</div>
                <div class="modal-form-group">
                    <label for="popupTemplateName">л¬ём„ң м–‘мӢқ мқҙлҰ„</label>
                    <input type="text" id="popupTemplateName" class="modal-input" placeholder="л¬ём„ң м–‘мӢқлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”" />
                </div>
                <div class="modal-form-group">
                    <label for="popupTemplateDesc">м„ӨлӘ…</label>
                    <textarea id="popupTemplateDesc" class="modal-textarea" rows="3" placeholder="м„ӨлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-cancel-btn" id="popupCancelBtn">м·ЁмҶҢ</button>
                    <button type="button" class="modal-create-btn" id="popupCreateBtn">мһ‘м„ұ</button>
                </div>
            </div>
        </div>

        <!-- [м¶”к°Җ] л¬ём„ң м–‘мӢқ м—…лҚ°мқҙнҠё нҢқм—… -->
        <div id="updatePopup" class="modal-backdrop" style="display: none;">
            <div class="modal-content">
                <div class="modal-title">л¬ём„ң м–‘мӢқ м—…лҚ°мқҙнҠё</div>
                <div class="modal-form-group" style="position:relative;">
                    <label for="updateTemplateSearch">кІҖмғүн•  м–‘мӢқ мқҙлҰ„</label>
                    <input type="text" id="updateTemplateSearch" class="modal-input" placeholder="л¬ём„ң м–‘мӢқлӘ… кІҖмғү" autocomplete="off" />
                    <div id="updateDropdown" class="modal-dropdown-list" style="display: none;"></div>
                    <div id="updateSelectedDesc" class="update-descbox">
                        <div style="font-weight:600;font-size:1.05rem;margin-bottom:2px;color:#242c5e;">м–‘мӢқ м„ӨлӘ…</div>
                        <span id="updateSelectedDescText"></span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-cancel-btn" id="popupUpdateCancelBtn">лӢ«кё°</button>
                    <button type="button" class="modal-create-btn" id="popupUpdateOkBtn">м—…лҚ°мқҙнҠё</button>
                </div>
            </div>
        </div>
        <!-- [/м¶”к°Җ] -->

        <!-- н…Ңмқҙлё” мҳҒм—ӯ -->
        <main>
            <div class="approval-table-wrapper">
                <table class="approval-table">
                    <thead>
                        <tr>
                            <th class="col-title">м–‘мӢқлӘ…</th>
                            <th class="col-version">лІ„м „</th>
                            <th class="col-usedoc">мӮ¬мҡ© л¬ём„ң мҲҳ</th>
                            <th class="col-updated">мөңмў… мҲҳм •мқј</th>
                            <th class="col-attend">к·јнғң м—°лҸҷ</th>
                            <th class="col-schedule">мқјм • м—°лҸҷ</th>
                            <th class="col-status">мғҒнғң</th>
                        </tr>
                    </thead>
                    <tbody id="approvalTableBody">
                        <!-- JavaScriptлЎң н–ү лҸҷм Ғ мғқм„ұ -->
                    </tbody>
                </table>
                <div id="approvalTableEmpty" class="empty-msg" style="display: none;">
                    н•ҙлӢ№н•ҳлҠ” м–‘мӢқмқҙ м—ҶмҠөлӢҲлӢӨ.
                </div>
            </div>
        </main>

        <!-- нҺҳмқҙм§Җл„Өмқҙм…ҳ -->
        <footer class="approval-pagination">
            <button type="button" class="pagination-btn" id="prevPageBtn">мқҙм „</button>
            <span id="pageIndicator" class="page-indicator"></span>
            <button type="button" class="pagination-btn" id="nextPageBtn">лӢӨмқҢ</button>
        </footer>
    </div>

    <!-- м„ём…ҳ л§ҢлЈҢ лӘЁлӢ¬ -->
    <div id="sessionModal"
         style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:10000;">
        <div style="background:#fff; padding:20px; margin:200px auto; width:300px;">
            <p>м„ём…ҳмқҙ л§ҢлЈҢлҗҳм—ҲмҠөлӢҲлӢӨ. лӢӨмӢң лЎңк·ёмқён•ҙмЈјм„ёмҡ”.</p>
            <button onclick="confirmSessionExpired()">нҷ•мқё</button>
        </div>
    </div>
</div>

<!-- JavaScript нҢҢмқјмқҖ layout-adminм—җм„ң common.jsк°Җ лЎңл“ңлҗҳлҜҖлЎң, approval-home.jsл§Ң м¶”к°Җ -->
<script th:src="@{/css/approval-home/approval-home.js}"></script>

</body>
</html>
