<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회사 가입 | Orbit Flow</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: #f7f9fb;
        }

        .signup-container {
            width: 860px;
            margin: 80px auto;
            background: #fff;
            border-radius: 12px;
            padding: 48px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
        }

        h1 {
            margin-bottom: 8px;
            color: #253464;
        }

        .desc {
            color: #6b7280;
            margin-bottom: 36px;
        }

        .row {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
        }

        .field {
            flex: 1;
            padding-right: 8px;
            padding-left: 8px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        .hint {
            font-size: 12px;
            margin-top: 6px;
        }

        .error {
            color: #ef4444;
        }

        .success {
            color: #10b981;
        }

        .business-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: #5687ef;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 32px;
        }

        .btn-check {
            width: 120px;
            height: 43.2px;
            background: #e5e7eb;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }


        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #6b7280;
        }

        .pw-toggle.active {
            color: #5687ef;
        }

        /* ======================
           비밀번호 보기 토글 (최종)
        ====================== */
        .password-field {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-field input {
            width: 100%;
            height: 43.2px;           /* 다른 input과 동일 */
            padding-right: 42px;     /* 아이콘 공간 */
            box-sizing: border-box;
        }

        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #6b7280;
            pointer-events: auto;
        }

        .pw-toggle.active {
            color: #5687ef;
        }


        .pw-toggle {
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .row {
                flex-direction: column;
            }
        }

        /* 모든 필드 기준 통일 */
        .field,
        .field * {
            box-sizing: border-box;
        }

        .business-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .business-row input {
            flex: 1;              /* 남은 공간 전부 차지 */
            height: 43.2px;       /* 다른 input과 동일 */
        }

        .business-row .btn-check {
            flex-shrink: 0;       /* 줄어들지 않게 */
            width: 120px;
            height: 43.2px;
        }

    </style>
</head>
<body>

<div class="signup-container">
    <h1>회사 가입</h1>
    <p class="desc">서비스 이용을 위한 회사 정보와 대표 관리자 계정을 등록해주세요.</p>

    <!-- 회사 정보 -->
    <div class="row">
        <div class="field">
            <label>회사명</label>
            <div class="business-row">
                <input id="companyName" maxlength="100">
                <button type="button"
                        class="btn-check"
                        onclick="checkCompanyName(event)">확인</button>
            </div>
            <div id="companyNameMsg" class="hint"></div>
        </div>
        <div class="field">
            <label>주소</label>
            <input id="address" maxlength="255">
            <div id="addressMsg" class="hint"></div>
        </div>
    </div>

    <!-- 대표자 -->
    <div class="row">
        <div class="field">
            <label>대표자명</label>
            <input id="representativeName" maxlength="50">
            <div id="representativeNameMsg" class="hint"></div>
        </div>
        <div class="field">
            <label>회사 대표 연락처</label>
            <input
                    id="representativeContact"
                    maxlength="20"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    placeholder="숫자만 입력"
            />
            <div id="contactMsg" class="hint"></div>
        </div>
    </div>

    <!-- 이메일 / 비밀번호 -->
    <div class="row">
        <div class="field">
            <label>대표 관리자 이메일</label>
            <input
                    id="adminEmail"
                    maxlength="100"
                    inputmode="email"
                    autocomplete="email"
                    placeholder="example@company.com"
            />
            <div id="emailMsg" class="hint"></div>
        </div>

        <div class="field">
            <label>비밀번호</label>
            <div class="password-field">
                <input
                        id="adminPassword"
                        type="password"
                        maxlength="15"
                        placeholder="8~15자"
                />
                <button type="button"
                        class="pw-toggle"
                        data-target="adminPassword"
                        aria-label="비밀번호 보기">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div id="passwordLengthMsg" class="hint"></div>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>비밀번호 확인</label>
            <div class="password-field">
                <input
                        id="adminPasswordConfirm"
                        type="password"
                        maxlength="15"
                        placeholder="비밀번호 재입력"
                />
                <button type="button"
                        class="pw-toggle"
                        data-target="adminPasswordConfirm"
                        aria-label="비밀번호 확인 보기">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div id="passwordMatchMsg" class="hint"></div>
        </div>

        <div class="field">
            <label>사업자번호</label>
            <div class="business-row">
                <input
                        id="businessNumber"
                        maxlength="20"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        placeholder="숫자만 입력"
                />
                <button type="button" class="btn-check" onclick="checkBusinessNumber()">확인</button>
            </div>
            <div id="businessMsg" class="hint"></div>
        </div>
    </div>

    <button
            id="signupBtn"
            class="btn"
            onclick="submitSignup()"
            disabled
    >
        가입하기
    </button>
</div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- 회사 가입 로직 -->
<script src="/js/company-signup.js"></script>
</body>
</html>
