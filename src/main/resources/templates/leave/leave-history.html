<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="
      ~{layout/layout-user :: layout(
      ~{::content},
      ~{fragments/header :: header},
      ~{sidebar/attendance/user-attendance-sidebar :: menu},
      ~{::pageCss}, ~{::pageScript})}">
<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/board/board.css}">
        <link rel="stylesheet" th:href="@{/css/leave/leave.css}">
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="board-container">
        <!-- 게시판 제목 -->
        <div class="board-header">
            <h1>휴가 신청 현황</h1>
        </div>

        <!-- 필터 섹션 -->
        <div class="board-search-section">
            <div class="search-filters">
                <div class="filter-select-wrapper">
                    <label for="filterType" class="filter-label">항목</label>
                    <select id="filterType" class="filter-select">
                        <option value="">전체</option>
                    </select>
                </div>
                <div class="filter-select-wrapper">
                    <label for="filterStatus" class="filter-label">상태</label>
                    <select id="filterStatus" class="filter-select">
                        <option value="">전체</option>
                        <option value="APPROVED">승인</option>
                        <option value="SUBMITTED">대기</option>
                        <option value="REJECTED">반려</option>
                    </select>
                </div>
                <div class="date-field-wrapper">
                    <label for="startDate" class="filter-label">시작일</label>
                    <input type="date" id="startDate" class="date-input">
                </div>
                <div class="date-field-wrapper">
                    <label for="endDate" class="filter-label">종료일</label>
                    <input type="date" id="endDate" class="date-input">
                </div>
                <div class="button-wrapper">
                    <label class="filter-label" style="opacity: 0;">버튼</label>
                    <div style="display: flex; gap: 8px;">
                        <button type="button" class="btn-search" onclick="applyFilters()">
                            <i class="fas fa-search" style="margin-right: 6px;"></i>
                            검색
                        </button>
                        <button type="button" class="btn-reset" onclick="resetFilters()">
                            초기화
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 휴가 상세 내역 -->
        <div class="board-table-container">
            <table class="board-table" id="leaveHistoryTable">
                <thead>
                <tr>
                    <th>항목</th>
                    <th>기간</th>
                    <th>일수</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody id="leaveHistoryList">
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="board-bottom-actions">
            <div class="pagination" id="leavePagination"></div>
        </div>
    </div>
</div>

<th:block th:fragment="pageScript">
    <script th:src="@{/js/leave/leave-history.js}"></script>
</th:block>

</body>
</html>
