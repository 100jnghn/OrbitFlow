<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">


<head>
    <meta charset="UTF-8">
    <title>차량 정보</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-car/admin-car.css}">
    </th:block>

    <!-- ✅ 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-car/admin-car.js}"></script>
    </th:block>
</head>
<body>

<!-- Main Content -->
<div th:fragment="content">

    <!-- Page Header -->
    <div class="detail-header">
        <div class="header-left">
            <button type="button" class="btn-back" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
                뒤로가기
            </button>
            <h1 class="page-title">차량 정보</h1>
        </div>
        <div class="header-actions">
            <button type="button" class="btn-primary" id="btn-edit">
                <i class="fas fa-edit"></i>
                수정
            </button>
            <button type="button" class="btn-danger" id="btn-delete">
                <i class="fas fa-trash-alt"></i>
                삭제
            </button>
        </div>
    </div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">

        <!-- Left Column: 기본 정보 -->
        <div class="left-column">

            <!-- 기본 정보 섹션 -->
            <section class="info-card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-info-circle"></i>
                        기본 정보
                    </h2>
                </div>

                <div class="card-body">
                    <div class="info-grid">
                        <!-- 차량 번호 -->
                        <div class="info-item">
                            <label class="info-label">차량 번호</label>
                            <input type="text"
                                   class="info-input"
                                   id="car-number"
                                   placeholder="차량 번호를 입력하세요"/>
                        </div>

                        <!-- 차종 -->
                        <div class="info-item">
                            <label class="info-label">차종</label>
                            <input type="text"
                                   class="info-input"
                                   id="car-model"
                                   placeholder="차종을 입력하세요"/>
                        </div>

                        <!-- 차량 이미지 -->
                        <div class="car-image-wrapper">
                            <div class="car-image-container" id="car-image-container">
                                <img id="car-image" 
                                     src="" 
                                     alt="차량 이미지" 
                                     style="display: none;">
                                <div class="car-image-placeholder" id="car-image-placeholder">
                                    <i class="fas fa-car"></i>
                                    <p>차량 이미지가 없습니다</p>
                                </div>
                            </div>
                        </div>

                        <!-- 운전 나이 -->
                        <div class="info-item">
                            <label class="info-label">운전 가능 나이</label>
                            <input type="text"
                                   class="info-input"
                                   id="car-age"
                                   placeholder="운전 가능한 나이를 입력하세요"/>
                        </div>

                        <!-- 상태 -->
                        <div class="info-item">
                            <label class="info-label">상태</label>
                            <select class="info-select" id="car-status">
                                <option value="">상태 선택</option>
                            </select>
                        </div>
                    </div>

                    <!-- 비고 -->
                    <div class="info-description-wrapper">
                        <label class="info-label">비고</label>
                        <input type="text"
                               class="info-textarea"
                               id="car-description"
                               placeholder="비고 내용을 입력하세요"/>
                    </div>
                </div>
            </section>

        </div>
    </div>
</div>

</body>
</html>
