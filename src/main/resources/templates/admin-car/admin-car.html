<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">


<head>
    <meta charset="UTF-8">
    <title>차량 정보</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-car/admin-car.css}">
    </th:block>

    <!-- ✅ 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-car/admin-car.js}"></script>
    </th:block>
</head>
<body>

<!-- Main Content -->
<div th:fragment="content">

    <!-- Page Header -->
    <div class="detail-header">
        <div class="header-left">
            <button type="button" class="btn-back" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
                뒤로가기
            </button>
            <h1 class="page-title">차량 정보</h1>
        </div>
        <div class="header-actions">
            <button type="button" class="btn-edit" id="btn-edit">
                <i class="fas fa-edit"></i>
                수정
            </button>
            <button type="button" class="btn-delete" id="btn-delete">
                <i class="fas fa-trash-alt"></i>
                삭제
            </button>
        </div>
    </div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">

        <!-- Left Column: 기본 정보 -->
        <div class="left-column">

            <!-- 기본 정보 섹션 -->
            <section class="info-card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-info-circle"></i>
                        기본 정보
                    </h2>
                </div>

                <div class="card-body">
                    <div class="info-grid">
                        <!-- 차량 번호 (text로 표시) -->
                        <div class="info-item">
                            <label class="info-label">차량 번호</label>
                            <div class="info-text" id="car-number">-</div>
                        </div>

                        <!-- 차종 -->
                        <div class="info-item">
                            <label class="info-label">차종 <span class="required">*</span></label>
                            <input type="text"
                                   class="info-input"
                                   id="car-model"
                                   placeholder="차종을 입력하세요"
                                   maxlength="50"/>
                            <span class="hint" id="car-model-msg"></span>
                        </div>

                        <!-- 차량 이미지 업로드 -->
                        <div class="car-image-wrapper">
                            <label class="info-label">차량 이미지 (선택사항)</label>
                            <div class="car-image-upload-container">
                                <input type="file"
                                       id="car-image-input"
                                       accept="image/*"
                                       style="display: none;">
                                <div class="car-image-preview" id="car-image-preview">
                                    <img id="car-image"
                                         src=""
                                         alt="차량 이미지"
                                         style="display: none;">
                                    <div class="upload-placeholder" id="upload-placeholder">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <p>클릭하여 이미지 업로드</p>
                                        <span class="upload-hint">JPG, PNG, GIF (최대 5MB)</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 운전 나이 -->
                        <div class="info-item">
                            <label class="info-label">운전 가능 나이 <span class="required">*</span></label>
                            <input type="number"
                                   class="info-input"
                                   id="car-age"
                                   placeholder="운전 가능한 나이를 입력하세요"
                                   min="0"/>
                            <span class="hint" id="car-age-msg"></span>
                        </div>

                        <div class="upload-actions">
                            <button type="button" class="btn-remove" id="btn-remove" style="display: none;">
                                <i class="fas fa-trash"></i>
                                제거
                            </button>
                        </div>

                        <!-- 상태 -->
                        <div class="info-item">
                            <label class="info-label">상태 <span class="required">*</span></label>
                            <select class="info-select" id="car-status">
                                <option value="">상태 선택</option>
                            </select>
                            <span class="hint" id="car-status-msg"></span>
                        </div>
                    </div>

                    <!-- 비고 -->
                    <div class="info-description-wrapper">
                        <label class="info-label">비고</label>
                        <input type="text"
                               class="info-textarea"
                               id="car-description"
                               placeholder="비고 내용을 입력하세요 (선택)"
                               maxlength="255"/>
                        <span class="hint" id="car-description-msg"></span>
                    </div>

                    <!-- 등록 정보 -->
                    <div class="creator-info">
                        <div class="creator-item">
                            <i class="fas fa-user"></i>
                            <span class="creator-label">등록자:</span>
                            <span class="creator-value" id="uploader-name">-</span>
                        </div>
                        <div class="creator-item">
                            <i class="fas fa-calendar-alt"></i>
                            <span class="creator-label">등록일:</span>
                            <span class="creator-value" id="created-at">-</span>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>
</div>

</body>
</html>
