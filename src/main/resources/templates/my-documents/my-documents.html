<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/approval/user-approval-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>기안함</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/my-documents/my-documents.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/css/my-documents/my-documents.js}"></script>
    </th:block>
</head>

<body>

<div th:fragment="content" class="my-documents-page">

    <!-- 검색 + 작성 버튼 -->
    <div class="search-header">
        <div class="search-area">
            <select id="statusFilter">
                <option value="ALL">전체</option>
                <option value="DRAFT">작성중</option>
                <option value="SUBMITTED">상신됨</option>
                <option value="IN_PROGRESS">결재중</option>
                <option value="APPROVED">승인완료</option>
                <option value="REJECTED">반려</option>
            </select>

            <select id="searchType">
                <option value="">검색 조건</option>
                <option value="TITLE">문서 제목</option>
                <option value="GROUP_NAME">양식명</option>
            </select>


            <div id="searchInputs"></div>
            <button id="searchBtn">검색</button>
        </div>

        <button id="createDocBtn" class="btn-primary">
            <i class="fas fa-pen"></i>
            문서 작성
        </button>
    </div>

    <!-- 문서 목록 -->
    <table class="document-table">
        <thead>
        <tr>
            <th>문서 제목</th>
            <th>양식명</th>
            <th>양식 버전</th>
            <th>작성일</th>
            <th>상태</th>
            <th>진행 단계</th>
            <th>결재 진행 상황</th>
        </tr>
        </thead>
        <tbody id="mydocTbody"></tbody>
    </table>

    <div id="nodataMsg" class="nodata" style="display:none;">
        조회된 문서가 없습니다.
    </div>

    <!-- 페이지네이션 -->
    <footer class="approval-pagination">
        <button type="button" class="pagination-btn" id="prevPageBtn">이전</button>
        <span id="pageIndicator" class="page-indicator"></span>
        <button type="button" class="pagination-btn" id="nextPageBtn">다음</button>
    </footer>

    <!-- ===============================
         문서 작성 팝업 (approval-home 구조 재사용)
         =============================== -->
    <div id="writePopup" class="modal-backdrop" style="display:none;">
        <div class="modal-content">

            <div class="modal-title">
                문서 양식 선택
            </div>


            <!-- 검색 -->
            <div class="modal-form-group">
                <label for="writeTemplateSearch">양식 검색</label>
                <input type="text"
                       id="writeTemplateSearch"
                       class="modal-input"
                       placeholder="양식명을 입력하세요"
                       autocomplete="off"/>
                <div class="hint" id="writeTemplateSearchHint"></div>

                <div id="writeTemplateDropdown"
                     class="modal-dropdown-list"
                     style="display:none;"></div>
            </div>

            <!-- 설명 -->
            <div class="modal-form-group">
                <label>설명</label>
                <div class="update-descbox">
                    <div class="update-desc-text"
                         id="writeSelectedDescText">
                        선택한 양식의 설명이 표시됩니다.
                    </div>
                </div>
            </div>

            <!-- 버튼 -->
            <div class="modal-actions">
                <button type="button"
                        class="modal-cancel-btn"
                        id="writePopupCancelBtn">
                    취소
                </button>
                <button type="button"
                        class="modal-create-btn"
                        id="writePopupOkBtn"
                        disabled>
                    작성하기
                </button>
            </div>

        </div>
    </div>

</div>

</body>
</html>
