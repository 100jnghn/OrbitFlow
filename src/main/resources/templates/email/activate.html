<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계정 활성화 | OrbitFlow</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #f6f8fb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .card {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,.12);
        }
        h1 {
            margin-bottom: 18px;
            font-size: 22px;
            font-weight: 900;
            text-align: center;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
        }
        .error {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #b91c1c;
        }
        .btn {
            margin-top: 24px;
            width: 100%;
            height: 46px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>계정 활성화</h1>

    <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password">
    </div>

    <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="confirm">
    </div>

    <div id="error" class="error"></div>

    <button class="btn" onclick="activate()">계정 활성화</button>
</div>

<script>
    const token = '[[${token}]]';
    const regex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;

    function activate() {
        const pw = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const error = document.getElementById('error');

        error.innerText = '';

        if (!regex.test(pw)) {
            error.innerText =
                '비밀번호는 영문, 숫자, 특수문자를 포함한 8자 이상이어야 합니다.';
            return;
        }

        if (pw !== confirm) {
            error.innerText = '비밀번호가 일치하지 않습니다.';
            return;
        }

        fetch(`/api/email/activate?token=${encodeURIComponent(token)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw })
        })
            .then(res => {
                if (!res.ok) throw new Error();
                alert('계정이 활성화되었습니다. 로그인해 주세요.');
                location.href = '/login';
            })
            .catch(() => {
                error.innerText =
                    '만료되었거나 이미 사용된 링크입니다.';
            });
    }
</script>

</body>
</html>
