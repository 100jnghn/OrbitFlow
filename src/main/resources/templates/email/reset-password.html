<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 재설정 | OrbitFlow</title>

  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap">

  <style>
    * { box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
    body {
      margin: 0;
      background: #f6f8fb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }
    input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }
    .error {
      margin-top: 8px;
      font-size: 13px;
      color: #ef4444;
    }
    .btn {
      width: 100%;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: #4f7cff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>비밀번호 재설정</h1>

  <form onsubmit="resetPassword(event)">
    <div class="form-group">
      <label>새 비밀번호</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label>새 비밀번호 확인</label>
      <input type="password" id="passwordConfirm" required>
    </div>

    <div id="error" class="error"></div>

    <button class="btn" type="submit">비밀번호 변경</button>
  </form>

</div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  // ---------- sweet alert 공통 래퍼 ---------- //
  window.sweetSuccess = function (message, type = 'success') {
    return Swal.fire({
      text: message,
      icon: type,
      confirmButtonText: '확인'
    });
  };

  window.sweetError = function (message, type = 'error') {
    return Swal.fire({
      text: message,
      icon: type,
      confirmButtonText: '확인'
    });
  };
</script>

<script>
  const token = '[[${token}]]';
  const regex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;

  function resetPassword(event) {
    event.preventDefault();

    const pw = password.value;
    const cf = passwordConfirm.value;
    const error = document.getElementById('error');
    const btn = document.querySelector('.btn');

    error.textContent = '';

    if (!regex.test(pw)) {
      error.textContent =
              '비밀번호는 영문, 숫자, 특수문자를 포함한 8자 이상이어야 합니다.';
      return;
    }

    if (pw !== cf) {
      error.textContent = '비밀번호가 일치하지 않습니다.';
      return;
    }

    btn.disabled = true;

    fetch(`/api/email/password/reset?token=${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    })
            .then(async res => {
              if (!res.ok) throw new Error();

              await sweetSuccess(
                      '비밀번호가 변경되었습니다. 다시 로그인해 주세요.'
              );
              location.href = '/login';
            })
            .catch(async () => {
              await sweetError(
                      '링크가 만료되었거나 이미 사용되었습니다.'
              );
              btn.disabled = false;
            });
  }
</script>

</body>
</html>
