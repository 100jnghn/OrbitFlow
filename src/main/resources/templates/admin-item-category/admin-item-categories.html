<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-item-category/admin-item-categories.css}">
    </th:block>
    <!-- ✅ 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-item-category/admin-item-categories.js}"></script>
    </th:block>
</head>

<body>

    <!-- Main Content -->
    <div th:fragment="content">
        <div class="board-container">
            <div class="page-header">
                <h1 class="page-title">카테고리 관리</h1>
                <button type="button" class="btn-back" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i>
                    뒤로가기
                </button>
            </div>

            <div class="table-container">
                <table class="category-table">
                    <colgroup>
                        <col style="width:10%">
                        <col style="width:90%">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>카테고리 정보</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
