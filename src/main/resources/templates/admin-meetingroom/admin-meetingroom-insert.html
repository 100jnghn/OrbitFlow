<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-admin :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/admin-sidebar :: menu},
        ~{::pageCss},
        ~{::pageScript}
      )}">


<head>
    <meta charset="UTF-8">
    <title>회의실 등록</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin-meetingroom/admin-meetingroom-insert.css}">
    </th:block>

    <!-- ✅ 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/admin-meetingroom/admin-meetingroom-insert.js}"></script>
    </th:block>
</head>
<body>

<!-- Main Content -->
<div th:fragment="content">

    <!-- Page Header -->
    <div class="detail-header">
        <div class="header-left">
            <button type="button" class="btn-back" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
                뒤로가기
            </button>
            <h1 class="page-title">회의실 등록</h1>
        </div>
        <div class="header-actions">
            <button type="button" class="btn-primary" id="btn-save">
                <i class="fas fa-save"></i>
                등록
            </button>
            <button type="button" class="btn-secondary" id="btn-cancel">
                <i class="fas fa-times"></i>
                취소
            </button>
        </div>
    </div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">

        <!-- Left Column: 기본 정보 -->
        <div class="left-column">

            <!-- 기본 정보 섹션 -->
            <section class="info-card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-info-circle"></i>
                        기본 정보
                    </h2>
                </div>

                <div class="card-body">
                    <div class="info-grid">
                        <!-- 회의실명 -->
                        <div class="info-item">
                            <label class="info-label">회의실명 <span class="required">*</span></label>
                            <input type="text"
                                   class="info-input"
                                   id="room-name"
                                   placeholder="회의실명을 입력하세요"
                                   maxlength="30"/>
                            <span class="hint" id="room-name-msg"></span>
                        </div>

                        <!-- 위치 -->
                        <div class="info-item">
                            <label class="info-label">위치 <span class="required">*</span></label>
                            <input type="text"
                                   class="info-input"
                                   id="room-position"
                                   placeholder="위치를 입력하세요"
                                   maxlength="50"/>
                            <span class="hint" id="room-position-msg"></span>
                        </div>

                        <!-- 상태 -->
                        <div class="info-item">
                            <label class="info-label">상태 <span class="required">*</span></label>
                            <select class="info-select" id="room-status">
                                <option value="">상태 선택</option>
                            </select>
                            <span class="hint" id="room-status-msg"></span>
                        </div>
                    </div>

                    <!-- 비고 -->
                    <div class="info-description-wrapper">
                        <label class="info-label">비고</label>
                        <input type="text"
                               class="info-textarea"
                               id="room-description"
                               placeholder="비고 내용을 입력하세요 (선택)"
                               maxlength="250"/>
                        <span class="hint" id="room-description-msg"></span>
                    </div>
                </div>
            </section>

        </div>

    </div>
</div>

</body>
</html>
