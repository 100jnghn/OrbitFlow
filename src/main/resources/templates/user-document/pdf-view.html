<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'문서_' + ${document.title}">문서 PDF</title>

    <!-- 폰트 -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">


    <!-- ❗ PDF 전용 스타일만 사용 -->
    <link rel="stylesheet" th:href="@{/css/user-document/pdf-view.css}">
</head>

<body>

<!-- ===============================
     PDF 전체 컨테이너 (A4 기준)
=============================== -->
<div class="pdf-document">

    <!-- ===============================
         PDF 헤더
    =============================== -->
    <header class="pdf-header">
        <h1 class="pdf-title" th:text="${document.title}">문서 제목</h1>

        <div class="pdf-meta">
            <span>
                기안자:
                <strong th:text="${document.submittedBy}">홍길동</strong>
            </span>
            <span>
                기안일:
                <strong th:text="${#temporals.format(document.submittedAt, 'yyyy-MM-dd')}">
                    2026-01-03
                </strong>
            </span>
            <span>
                상태:
                <strong th:text="${document.status}">APPROVED</strong>
            </span>
        </div>
    </header>

    <!-- ===============================
         PDF 본문 (🔥 핵심)
    =============================== -->
    <main class="pdf-content">
        <div class="pdf-content-inner"
             th:utext="${documentContentHtml}">
            <!-- 서버에서 렌더링된 HTML -->
        </div>
    </main>

    <!-- ===============================
         결재선
    =============================== -->
    <section class="pdf-approval-lines">
        <h3 class="pdf-section-title">결재선</h3>

        <div class="approval-line-list">
            <div th:each="line : ${approvalLines}"
                 class="approval-line-item"
                 th:classappend="${line.status.toLowerCase()}">

                <div class="approver-name"
                     th:text="${line.orderNo} + '차 · ' + ${line.approverDisplay}">
                </div>

                <div class="approver-status"
                     th:text="${line.status}">
                </div>

                <div class="approver-comment"
                     th:if="${line.comment != null}"
                     th:text="${line.comment}">
                </div>
            </div>
        </div>
    </section>

</div>

</body>
</html>
