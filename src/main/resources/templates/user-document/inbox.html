<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/approval/user-approval-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">
<head>
    <meta charset="UTF-8">
    <title>결재 대기함</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/user-document/inbox.css}">
    </th:block>

    <th:block th:fragment="pageScript">
        <script th:src="@{/js/user-document/inbox.js}"></script>
    </th:block>
</head>
<body>

<div th:fragment="content">
    <div class="approval-container">

        <!-- 제목 -->
        <div class="approval-header">
            <h1 id="approvalTitle">결재 대기함</h1>
        </div>

        <!-- 검색 & 필터 -->
        <div class="approval-search-section">
            <div class="approval-search-filters">

                <!-- 날짜 필터 -->
                <select id="dateFilter" class="approval-filter-select">
                    <option value="">결재일(기간)</option>
                    <option value="today">오늘</option>
                    <option value="week">이번 주</option>
                    <option value="month">이번 달</option>
                    <option value="custom">기간 선택</option>
                </select>

                <input type="date"
                       id="startDate"
                       class="approval-date-input"
                       style="display:none;">

                <input type="date"
                       id="endDate"
                       class="approval-date-input"
                       style="display:none;">

                <!-- 문서 상태 -->
                <select id="documentStatus" class="approval-filter-select">
                    <option value="">문서 상태</option>
                    <option value="IN_PROGRESS">진행중</option>
                    <option value="APPROVED">승인</option>
                    <option value="REJECTED">반려</option>
                </select>

                <!-- 결재 상태 -->
                <select id="approvalStatus" class="approval-filter-select">
                    <option value="">결재 상태</option>
                    <option value="IN_PROGRESS">내 차례</option>
                    <option value="WAITING">대기중</option>
                    <option value="APPROVED">결재 완료</option>
                    <option value="REJECTED">반려</option>
                </select>

                <!-- 검색 타입 -->
                <select id="searchType" class="approval-filter-select">
                    <option value="ALL">전체</option>
                    <option value="TITLE">문서 제목</option>
                    <option value="WRITER">기안자</option>
                    <option value="TEMPLATE">양식명</option>
                </select>

                <!-- 검색어 -->
                <input
                        type="text"
                        id="keyword"
                        class="approval-search-input"
                        placeholder="검색어 입력"
                        maxlength="100"
                >

                <button type="button"
                        class="approval-btn-search"
                        onclick="searchApprovals()">
                    <i class="fas fa-search"></i> 검색
                </button>
            </div>
        </div>

        <!-- 목록 테이블 -->
        <div class="approval-table-container">
            <table class="approval-table">
                <thead>
                <tr>
                    <th class="index-col">번호</th>
                    <th class="title-col">문서 제목</th>
                    <th>기안자</th>
                    <th>양식</th>
                    <th>현재 결재자</th>
                    <th>결재 상태</th>
                    <th>기안일</th>
                </tr>
                </thead>

                <tbody id="approvalTableBody">
                <tr>
                    <td colspan="7"
                        class="approval-empty-row">
                        결재 문서가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="approval-bottom-actions">
            <div class="approval-pagination" id="approvalPagination"></div>
        </div>

    </div>
</div>

</body>
</html>
