<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/approval/user-approval-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>결재 문서 상세</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/user-document/detail.css}">
        <link rel="stylesheet" th:href="@{/css/ui/fullscreenSpinner.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/user-document/detail.js}" type="module"></script>
    </th:block>
</head>

<body>

<!-- ===============================
     Main Content
=============================== -->
<div th:fragment="content" class="document-detail-page">

    <!-- ===============================
         문서 헤더
    =============================== -->
    <section class="document-header document-header--only-status">
    <span id="documentStatusBadge" class="status-badge">
        결재중
    </span>
    </section>

    <!-- ===============================
         본문 영역 (좌 / 우)
    =============================== -->
    <section class="document-body">

        <!-- ===============================
             좌측 : 문서 내용 패널
        =============================== -->
        <div class="document-content-panel">

            <!-- document-content 렌더링 영역 -->
            <div id="documentContentContainer">
                <!-- JS로 document-content 렌더링 -->
            </div>

        </div>

        <!-- ===============================
             우측 : 결재 / 부가 정보 패널
        =============================== -->
        <aside class="document-side-panel">

            <!-- ===== 결재선 / 코멘트 ===== -->
            <section class="side-panel-box" id="approvalLinePanel">
                <h3>결재 정보</h3>

                <div id="approvalLineList">
                    <!--
                    <div class="approval-line-item">
                        <div class="approver-name">영업본부 / 본부장 / 홍길동</div>
                        <div class="approver-status approved">승인</div>
                        <div class="approver-comment">검토 완료</div>
                    </div>
                    -->
                </div>
            </section>

            <!-- ===== 첨부 / 참조 문서 ===== -->
            <section class="side-panel-box" id="attachmentPanel">
                <h3>첨부 / 참조 문서</h3>

                <ul id="attachmentList">
                    <!--
                    <li>
                        <a href="#">사업계획서.pdf</a>
                    </li>
                    -->
                </ul>
            </section>

            <!-- ===== AI 요약 ===== -->
            <section class="side-panel-box" id="aiSummaryPanel">
                <h3>AI 문서 요약</h3>

                <!-- 생성 전 / 안내 -->
                <div class="ai-empty hidden" id="aiSummaryEmpty">
                    <div class="ai-empty-text" id="aiSummaryEmptyText">
                        아직 생성되지 않았습니다.
                    </div>
                    <button id="aiSummaryCreateBtn" class="ai-create-btn">
                        AI 요약 생성
                    </button>
                </div>


                <!-- 생성 완료 -->
                <div class="ai-result hidden" id="aiSummaryResult"></div>
            </section>


            <!-- ===== AI 비교 ===== -->
            <section class="side-panel-box" id="aiComparePanel">
                <h3>AI 문서 비교</h3>

                <!-- 생성 전 / 안내 -->
                <div class="ai-empty hidden" id="aiDiffEmpty">
                    <div class="ai-empty-text" id="aiDiffEmptyText">
                        비교 대상이 없습니다.
                    </div>
                    <button id="aiDiffCreateBtn" class="ai-create-btn">
                        AI 비교 생성
                    </button>
                </div>

                <!-- 생성 완료 -->
                <div class="ai-result hidden" id="aiDiffResult"></div>
            </section>


        </aside>
    </section>

    <!-- ===============================
         하단 액션 버튼 영역
    =============================== -->
    <section class="document-action-bar">
        <div class="action-right">
            <div class="action-left">
                <button id="backBtn" class="action-btn secondary">
                    이전
                </button>

                <button id="goOriginalBtn"
                        class="action-btn secondary"
                        style="display:none;">
                    원본 문서로 이동
                </button>

                <button id="goRevisionBtn"
                        class="action-btn secondary"
                        style="display:none;">
                    재기안 문서로 이동
                </button>

                <button id="reviseBtn"
                        class="action-btn primary"
                        style="display:none;">
                    재기안 하기
                </button>
            </div>


            <div class="action-right-group">
                <button id="rejectBtn" class="action-btn danger" style="display:none;">
                    반려
                </button>
                <button id="approveBtn" class="action-btn primary" style="display:none;">
                    승인
                </button>
            </div>
        </div>
    </section>

    <!-- ===============================
     승인 / 반려 모달 (inbox 팝업 스타일)
    =============================== -->
    <div id="approvalModal" class="modal-backdrop hidden">
        <div class="approval-modal">
            <div class="modal-title" id="approvalModalTitle">문서 승인</div>

            <div class="modal-form-group">
            <textarea
                    id="approvalComment"
                    class="modal-input"
                    placeholder="의견을 입력하세요 (선택)"
                    rows="4"
            ></textarea>
                <div class="hint" id="approvalCommentHint"></div>
            </div>

            <div class="modal-actions">
                <button type="button" class="modal-cancel-btn" id="approvalCancelBtn">
                    취소
                </button>
                <button type="button" class="modal-create-btn" id="approvalConfirmBtn">
                    승인
                </button>
            </div>
        </div>
    </div>

    <!-- ===============================
         결재 서명 등록 / 갱신 팝업
    =============================== -->
    <div id="signatureModal" class="modal-backdrop hidden">
        <div class="approval-modal signature-modal">

            <div class="modal-title">결재 서명 등록</div>

            <div class="modal-form-group">

                <div class="signature-guide">
                    결재 승인 시 사용될 서명 이미지를 등록해주세요.
                </div>

                <!-- 서명 업로드 영역 -->
                <div class="signature-upload-container">
                    <div
                            class="signature-preview-box"
                            id="signaturePreviewBox"
                    >
                        <img
                                id="signaturePreviewImage"
                                style="display:none;"
                                alt="서명 미리보기"
                        />
                        <div
                                class="signature-placeholder"
                                id="signaturePlaceholder"
                        >
                            <i class="fa-solid fa-signature"></i>
                            <p>서명 이미지 업로드</p>
                            <span class="signature-hint">
                            클릭하여 이미지 선택
                        </span>
                        </div>
                    </div>

                    <button
                            type="button"
                            class="signature-remove-btn"
                            id="signatureRemoveBtn"
                            style="display:none;"
                    >
                        제거
                    </button>
                </div>

                <input
                        type="file"
                        id="signatureInput"
                        accept="image/png, image/jpeg"
                        hidden
                />

                <div class="hint error" id="signatureHint"></div>
            </div>

            <div class="modal-actions">
                <button class="modal-cancel-btn" id="signatureCancelBtn">
                    취소
                </button>
                <button class="modal-create-btn" id="signatureSaveBtn">
                    서명 등록
                </button>
            </div>
        </div>
    </div>


</div>

</body>
</html>
