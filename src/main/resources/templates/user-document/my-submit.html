<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
        ~{::content},
        ~{fragments/header :: header},
        ~{sidebar/approval/user-approval-sidebar :: sidebar},
        ~{::pageCss},
        ~{::pageScript}
      )}">

<head>
    <meta charset="UTF-8">
    <title>기안함</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 페이지별 CSS -->
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/user-document/inbox.css}">
        <link rel="stylesheet" th:href="@{/css/user-document/my-submit.css}">
    </th:block>

    <!-- 페이지별 JS -->
    <th:block th:fragment="pageScript">
        <script th:src="@{/js/user-document/my-submit.js}"></script>
    </th:block>
</head>

<body>

<div th:fragment="content" class="my-documents-page">

    <div th:fragment="content">
        <div class="approval-container">

            <!-- 제목 -->
            <div class="approval-header">
                <h1>기안함</h1>
            </div>

            <!-- 검색 / 필터 -->
            <div class="approval-search-section">
                <div class="approval-search-filters">

                    <!-- 문서 상태 -->
                    <select id="statusFilter" class="approval-filter-select">
                        <option value="ALL">전체</option>
                        <option value="DRAFT">작성중</option>
                        <option value="SUBMITTED">상신됨</option>
                        <option value="IN_PROGRESS">결재중</option>
                        <option value="APPROVED">승인완료</option>
                        <option value="REJECTED">반려</option>
                    </select>

                    <!-- 검색 타입 -->

                    <!-- 날짜 -->
                    <input type="date" id="startDate" class="approval-date-input">
                    <span>~</span>
                    <input type="date" id="endDate" class="approval-date-input">

                    <select id="searchType" class="approval-filter-select">
                        <option value="TITLE">문서 제목</option>
                        <option value="GROUP_NAME">양식명</option>
                    </select>

                    <!-- 검색어 -->
                    <input
                            type="text"
                            id="keyword"
                            class="approval-search-input"
                            placeholder="검색어 입력"
                            maxlength="50"
                    />

                    <button type="button"
                            class="approval-btn-search"
                            id="searchBtn">
                        <i class="fas fa-search"></i> 검색
                    </button>
                    <button type="button"
                            class="approval-btn-secondary"
                            id="clearBtn">
                        <i class="fas fa-rotate-right"></i>
                        초기화
                    </button>

                </div>
            </div>
            <!-- 테이블 -->
            <div class="approval-table-container">
                <table class="approval-table">
                    <!-- ⭐ 컬럼 비율 고정 -->
                    <colgroup>
                        <col style="width:6%">   <!-- 번호 -->
                        <col style="width:20%">  <!-- 문서 제목 -->
                        <col style="width:16%">  <!-- 양식명 -->
                        <col style="width:9%">   <!-- 양식 버전 -->
                        <col style="width:16%">  <!-- 작성일 -->
                        <col style="width:8%">   <!-- 상태 -->
                        <col style="width:10%">  <!-- 진행 단계 -->
                        <col style="width:13%">  <!-- 결재 진행 상황 -->
                    </colgroup>

                    <thead>
                    <tr>
                        <th class="index-col">번호</th>
                        <th>문서 제목</th>
                        <th>양식명</th>
                        <th>양식 버전</th>
                        <th>작성일</th>
                        <th>상태</th>
                        <th>진행 단계</th>
                        <th>결재 진행 상황</th>
                    </tr>
                    </thead>

                    <tbody id="mydocTbody">
                    <tr>
                        <td colspan="8" class="approval-empty-row">
                            조회된 문서가 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>


            <!-- 페이지네이션 -->
            <div class="approval-bottom-actions">
                <div class="approval-pagination" id="approvalPagination"></div>

                <div class="approval-write-action">
                    <button id="createDocBtn" class="approval-btn-primary">
                        <i class="fas fa-pen"></i>
                        문서 작성
                    </button>
                </div>
            </div>

            <!-- ===============================
         문서 작성 팝업 (approval-home 구조 재사용)
         =============================== -->
            <div id="writePopup" class="modal-backdrop" style="display:none;">
                <div class="modal-content">

                    <div class="modal-title">
                        문서 양식 선택
                    </div>


                    <!-- 검색 -->
                    <div class="modal-form-group">
                        <label for="writeTemplateSearch">양식 검색</label>
                        <input type="text"
                               id="writeTemplateSearch"
                               class="modal-input"
                               placeholder="양식명을 입력하세요"
                               autocomplete="off"/>
                        <div class="hint" id="writeTemplateSearchHint"></div>

                        <div id="writeTemplateDropdown"
                             class="modal-dropdown-list"
                             style="display:none;"></div>
                    </div>

                    <!-- 설명 -->
                    <div class="modal-form-group">
                        <label>설명</label>
                        <div class="update-descbox">
                            <div class="update-desc-text"
                                 id="writeSelectedDescText">
                                선택한 양식의 설명이 표시됩니다.
                            </div>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <div class="modal-actions">
                        <button type="button"
                                class="modal-cancel-btn"
                                id="writePopupCancelBtn">
                            취소
                        </button>
                        <button type="button"
                                class="modal-create-btn"
                                id="writePopupOkBtn"
                                disabled>
                            작성하기
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>


</div>

</body>
</html>
