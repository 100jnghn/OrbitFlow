<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <script src="/js/common.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const res = await apiFetch('/api/auth/me');
            if (!res.ok) location.href = '/login';
        });

    </script>
</head>
<body>


<!-- 세션 만료 모달 -->
<div id="sessionModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4)">
    <div style="background:#fff; padding:20px; margin:200px auto; width:300px;">
        <p>세션이 만료되었습니다. 다시 로그인해주세요.</p>
        <button onclick="confirmSessionExpired()">확인</button>
    </div>
</div>


메인 페이지는 다같이 만들어보아용 ><

<span id="userName"></span>
<button onclick="logout()">로그아웃</button>

</body>
</html>
