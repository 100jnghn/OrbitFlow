<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout-user :: layout(
         ~{::content},
         ~{fragments/header :: header},
         ~{::user-sidebar-menu},
         ~{::pageCss},
         ~{::pageScript}
     )}">

<!-- =========================
     페이지 전용 CSS
========================= -->
<th:block th:fragment="pageCss">
    <link rel="stylesheet" th:href="@{/css/organization/org-tree.css}">
</th:block>

<!-- =========================
     메인 콘텐츠
========================= -->
<th:block th:fragment="content">
    <div class="org-page">

        <!-- 좌측: 조직 트리 -->
        <aside id="org-tree-container" class="org-tree"></aside>

        <!-- 우측: 사원 상세 (메인) -->
        <section id="employee-panel" class="employee-panel hidden">

            <!-- Hero -->
            <div class="emp-hero">
                <img id="empAvatar"
                     class="emp-avatar"
                     src="/images/male.png"
                     alt="profile"/>

                <div class="emp-main">
                    <div class="emp-name">
                        <span id="empName">-</span>
                        <span id="empWorkDot" class="hero-work-dot"></span>
                    </div>
                    <div class="emp-summary" id="empSummary">-</div>

<!--                    <div id="empStatus" class="emp-status"></div>-->

                    <div class="emp-meta">
                        <span id="empEmail">-</span>
                        <span class="dot">•</span>
                        <span>내선 <b id="empInternalPhone">-</b></span>
                    </div>
                </div>

                <div class="emp-actions">
                    <button id="myActionBtn" class="btn-primary hidden">
                        결재 서명 등록
                    </button>
                </div>

            </div>

            <!-- Info -->
            <div class="emp-info-card">
                <div class="kv">
                    <div class="k">조직</div>
                    <div class="v" id="empOrg">-</div>

                    <div class="k">직급</div>
                    <div class="v" id="empRank">-</div>

                    <div class="k">직책</div>
                    <div class="v" id="empPosition">-</div>

                    <div class="k">근무상태</div>
                    <div class="v" id="empWorkStatus">-</div>

                    <div class="k">사번</div>
                    <div class="v" id="empEmployeeNo">-</div>

                    <div class="k">고용형태</div>
                    <div class="v" id="empEmploymentType">-</div>

                    <div class="k">입사일</div>
                    <div class="v" id="empHireDate">-</div>

                </div>
            </div>

        </section>
    </div>


    <!-- ===============================
     결재 서명 등록 / 갱신 팝업
=============================== -->
    <div id="signatureModal" class="modal-backdrop hidden">
        <div class="approval-modal signature-modal">

            <div class="modal-title">결재 서명 등록</div>

            <div class="modal-form-group">
                <div class="signature-guide">
                    결재 승인 시 사용될 서명 이미지를 등록해주세요.
                </div>

                <div class="signature-upload-container">
                    <div class="signature-preview-box" id="signaturePreviewBox">
                        <img id="signaturePreviewImage" style="display:none;" />
                        <div class="signature-placeholder" id="signaturePlaceholder">
                            <i class="fa-solid fa-signature"></i>
                            <p>서명 이미지 업로드</p>
                            <span class="signature-hint">클릭하여 이미지 선택</span>
                        </div>
                    </div>

                    <button
                            type="button"
                            class="signature-remove-btn"
                            id="signatureRemoveBtn"
                            style="display:none;"
                    >
                        제거
                    </button>
                </div>

                <input type="file" id="signatureInput" hidden />
            </div>

            <div class="modal-actions">
                <button id="signatureCancelBtn">취소</button>
                <button id="signatureSaveBtn">서명 등록</button>
            </div>
        </div>
    </div>

</th:block>

<!-- =========================
     페이지 전용 JS
========================= -->
<th:block th:fragment="pageScript">
    <script th:inline="javascript">
        const targetEmployeeId = [[${employeeId}]];
    </script>
    <script th:src="@{/js/org-tree.js}"></script>
</th:block>

<!-- =========================
     사용자 사이드바 메뉴
========================= -->
<ul th:fragment="user-sidebar-menu" class="sidebar-menu">
</ul>

</html>
