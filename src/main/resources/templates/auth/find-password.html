<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정 | OrbitFlow</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            background: #f6f8fb;
            min-height: 100vh; /* 변경 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 32px;
        }

        .title h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }

        .title p {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #4f7cff;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.15);
        }

        .btn {
            width: 100%;
            height: 48px;
            border-radius: 10px;
            border: none;
            background: #4f7cff;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn:hover {
            background: #3f6bf2;
        }

    </style>
</head>
<body>

<div class="card">
    <div class="title">
        <h1>비밀번호 재설정</h1>
        <p>가입한 이메일을 입력하세요.</p>
    </div>

    <form onsubmit="requestReset(event)">
        <div class="form-group">
            <label>이메일</label>
            <input id="email" type="email" required>
        </div>

        <button id="submitBtn" class="btn" type="submit">
            재설정 메일 보내기
        </button>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    async function requestReset(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const btn = document.getElementById('submitBtn');

        btn.disabled = true;

        Swal.fire({
            title: '메일 전송 중',
            text: '잠시만 기다려주세요…',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        try {
            const res = await fetch(
                `/api/email/password/reset-request?email=${encodeURIComponent(email)}`,
                {method: 'POST'}
            );

            if (!res.ok) {
                throw new Error('request failed');
            }


            Swal.fire({
                icon: 'success',
                title: '메일 전송 완료',
                html: `
    입력한 이메일로 비밀번호 재설정 안내를 보냈습니다.<br>
    <span style="color:#6b7280; font-size:13px;">
      (계정이 존재할 경우에만 전송됩니다)
    </span>
  `,
                confirmButtonText: '확인'
            });


        } catch (e) {
            Swal.fire({
                icon: 'error',
                title: '요청 실패',
                text: '요청을 처리할 수 없습니다. 잠시 후 다시 시도해주세요.',
                confirmButtonText: '확인'
            });
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
