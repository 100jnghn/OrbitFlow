<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 재설정 | OrbitFlow</title>

  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      margin: 0;
      background: #f6f8fb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }

    .title {
      text-align: center;
      margin-bottom: 32px;
    }

    .title h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }

    .title p {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #4f7cff;
      box-shadow: 0 0 0 3px rgba(79,124,255,0.15);
    }

    .btn {
      width: 100%;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: #4f7cff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn:hover {
      background: #3f6bf2;
    }

    .msg {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      color: #374151;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">
    <h1>비밀번호 재설정</h1>
    <p>가입한 이메일을 입력하세요.</p>
  </div>

  <form onsubmit="requestReset(event)">
    <div class="form-group">
      <label>이메일</label>
      <input id="email" type="email" required>
    </div>

    <button id="submitBtn" class="btn" type="submit">
      재설정 메일 보내기
    </button>

    <div id="msg" class="msg"></div>
  </form>
</div>

<script>
  async function requestReset(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    btn.disabled = true;
    msg.textContent = '처리 중입니다…';

    try {
      await fetch(
              `/api/email/password/reset-request?email=${encodeURIComponent(email)}`,
              { method: 'POST' }
      );

      msg.textContent =
              '메일이 전송되었습니다. (계정이 존재할 경우)';
    } catch {
      msg.textContent =
              '요청을 처리할 수 없습니다. 잠시 후 다시 시도해주세요.';
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
