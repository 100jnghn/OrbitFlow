<form onsubmit="requestReset(event)">
  <h2>비밀번호 재설정</h2>

  <input id="email"
         type="email"
         placeholder="이메일 입력"
         required />

  <button id="submitBtn" type="submit">
    재설정 메일 보내기
  </button>

  <p id="msg" style="margin-top:12px; font-size:13px;"></p>
</form>

<script>
  async function requestReset(e) {
    e.preventDefault();

    const emailInput = document.getElementById('email');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    btn.disabled = true;
    msg.textContent = '처리 중입니다…';

    try {
      await fetch(
              `/api/email/password/reset-request?email=${encodeURIComponent(emailInput.value)}`,
              { method: 'POST' }
      );

      // 보안상 항상 동일 메시지
      msg.textContent =
              '메일이 전송되었습니다. (계정이 존재할 경우)';
    } catch (err) {
      msg.textContent =
              '요청을 처리할 수 없습니다. 잠시 후 다시 시도해주세요.';
    } finally {
      btn.disabled = false;
    }
  }
</script>
